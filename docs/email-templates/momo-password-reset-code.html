<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOMO小说密码重置验证码</title>
</head>
<body style="margin:0;padding:0;background:#f7f3ee;font-family:Arial,'Microsoft YaHei',sans-serif;color:#2b2522;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f7f3ee;padding:28px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="width:100%;max-width:600px;background:#ffffff;border:1px solid #eadfd6;border-radius:10px;overflow:hidden;">
          <tr>
            <td style="padding:30px 28px 24px 28px;text-align:center;background:#8b5e57;color:#ffffff;">
              <div style="font-size:14px;line-height:1.6;opacity:0.92;">MOMO小说密码重置验证码</div>
              <div style="margin:12px auto 0 auto;padding:18px 16px;background:#ffffff;border-radius:8px;color:#8b3f35;">
                <div style="font-size:13px;line-height:1.6;color:#7a6b63;">您的验证码</div>
                <div style="margin-top:4px;font-size:36px;line-height:1.2;font-weight:bold;letter-spacing:8px;color:#8b3f35;">
                  {{code}}
                </div>
              </div>
              <div style="margin-top:12px;font-size:13px;line-height:1.7;opacity:0.92;">
                请在 {{expire_minutes}} 分钟内完成验证
              </div>
            </td>
          </tr>

          <tr>
            <td style="padding:28px 30px 8px 30px;">
              <p style="margin:0 0 16px 0;font-size:16px;line-height:1.8;">您好：</p>
              <p style="margin:0 0 16px 0;font-size:16px;line-height:1.8;">
                您正在进行 MOMO 小说账号密码重置，请在页面中输入邮件开头显示的验证码。
              </p>
              <p style="margin:0 0 16px 0;font-size:15px;line-height:1.8;color:#5a4d47;">
                验证码仅用于本次密码重置，请勿转发或泄露给他人。
              </p>
              <p style="margin:0 0 20px 0;font-size:15px;line-height:1.8;color:#5a4d47;">
                如果这不是您本人操作，请忽略本邮件，您的账号仍然安全。
              </p>
            </td>
          </tr>

          <tr>
            <td style="padding:0 30px 30px 30px;">
              <div style="padding-top:18px;border-top:1px solid #eee4dc;font-size:13px;line-height:1.7;color:#8a7b73;">
                本邮件由系统自动发送，请勿直接回复。<br>
                MOMO小说 · xs.momofx.cn
              </div>
            </td>
          </tr>
        </table>

        <div style="width:100%;max-width:600px;margin-top:14px;font-size:12px;line-height:1.7;color:#9a8e86;text-align:center;">
          如果您没有请求重置密码，可以安全忽略这封邮件。
        </div>
      </td>
    </tr>
  </table>
</body>
</html>
