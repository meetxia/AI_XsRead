<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>大学生的终极请假条</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One:wght@400&family=Nunito:wght@300;400;600;700&display=swap');
        
        * {
            box-sizing: border-box;
            font: inherit;
        }

        html {
            color: #333;
            font-size: 62.5%;
        }

        @media screen and (max-width: 480px) {
            html {
                font-size: 50%;
            }
        }

        body {
            font-size: 2rem;
            padding: 0;
            margin: 0;
            width: 100vw;
            height: 100vh;
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #E0D7C7 0%, #9DAAB6 50%, #E5D0CC 100%);
            overflow: hidden;
            position: relative;
        }

        /* Enhanced animated background */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.5; }
            50% { transform: translateY(-30px) rotate(180deg); opacity: 1; }
        }

        /* Dynamic gradient waves */
        .wave {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: linear-gradient(90deg, #B8C5B4, #9DAAB6, #E5D0CC);
            opacity: 0.4;
            animation: wave 3s ease-in-out infinite;
        }

        @keyframes wave {
            0%, 100% { transform: translateX(0) scaleY(1); }
            50% { transform: translateX(-50px) scaleY(1.2); }
        }

        /* Matrix rain effect */
        .matrix-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .matrix-char {
            position: absolute;
            color: rgba(0, 255, 0, 0.1);
            font-family: 'Courier New', monospace;
            font-size: 14px;
            animation: matrixFall 4s linear infinite;
        }

        @keyframes matrixFall {
            0% { transform: translateY(-100vh); opacity: 1; }
            100% { transform: translateY(100vh); opacity: 0; }
        }

        .confirm,
        .accepted,
        .rejected {
            position: absolute;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100rem;
            max-width: 95%;
            min-width: 34rem;
            max-height: 95%;
            height: 66rem;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(15px);
            border-radius: 3rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15), 0 0 80px rgba(255, 255, 255, 0.1);
            border: 3px solid rgba(255, 255, 255, 0.3);
            animation: slideIn 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideIn {
            from { transform: translate(-50%, -50%) scale(0.8) rotateY(10deg); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1) rotateY(0deg); opacity: 1; }
        }

        .confirm-body,
        .accepted-body,
        .rejected-body {
            flex: 1;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            position: relative;
            margin: 10rem 4rem 2rem 4rem;
        }

        .confirm-body-title,
        .accepted-body-title,
        .rejected-body-title {
            margin: 0;
            padding: 0;
            position: absolute;
            transform: translateY(-50%);
            top: 8%;
            text-align: center;
            width: 100%;
            font-family: 'Fredoka One', cursive;
            font-size: 3.2rem;
            color: #2c3e50;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.2);
            animation: titleGlow 3s ease-in-out infinite;
        }

        @keyframes titleGlow {
            0%, 100% { text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.15); }
            50% { text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.15), 0 0 20px rgba(157, 170, 182, 0.4); }
        }

        .confirm-body-subtitle,
        .accepted-body-subtitle,
        .rejected-body-subtitle {
            margin: 0;
            padding: 0;
            position: absolute;
            transform: translateY(-50%);
            top: 18%;
            text-align: center;
            width: 100%;
            font-size: 2rem;
            color: #7f8c8d;
            font-weight: 600;
            animation: subtitleFloat 4s ease-in-out infinite;
        }

        @keyframes subtitleFloat {
            0%, 100% { transform: translateY(-50%); }
            50% { transform: translateY(-55%); }
        }

        .confirm-body-button,
        .confirm-body-button:link,
        .confirm-body-button:visited,
        .accepted-body-button,
        .rejected-body-button {
            color: #fff;
            border-radius: 2.5rem;
            text-decoration: none;
            padding: 2rem 4rem;
            margin-bottom: 2rem;
            min-width: 15rem;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: 700;
            font-size: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
            border: none;
            cursor: pointer;
            transform: translateY(0);
        }

        .confirm-body-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.6s;
        }

        .confirm-body-button:hover::before {
            left: 100%;
        }

        .confirm-body-button-delete {
            background: linear-gradient(135deg, #D4A5A5, #C19A9A, #B08888);
            transform: scale(1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .confirm-body-button-delete:hover {
            background: linear-gradient(135deg, #E0B0B0, #D4A5A5, #C19A9A);
            transform: scale(1.1) rotate(-2deg);
            box-shadow: 0 15px 40px rgba(212, 165, 165, 0.4);
        }

        .confirm-body-button-cancel {
            background: linear-gradient(135deg, #B8C5B4, #A8B9A5, #98AA95);
            animation: acceptPulse 3s ease-in-out infinite;
        }

        .confirm-body-button-cancel:hover {
            background: linear-gradient(135deg, #C8D5C4, #B8C5B4, #A8B9A5);
            transform: scale(1.1) rotate(2deg);
            box-shadow: 0 15px 40px rgba(184, 197, 180, 0.4);
        }

        @keyframes acceptPulse {
            0%, 100% { box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); }
            50% { box-shadow: 0 10px 40px rgba(184, 197, 180, 0.5); }
        }

        .accepted-body-button,
        .rejected-body-button {
            background: linear-gradient(135deg, #9DAAB6, #8A98A5, #778694);
        }

        .accepted-body-button:hover,
        .rejected-body-button:hover {
            background: linear-gradient(135deg, #ADBAC6, #9DAAB6, #8A98A5);
            transform: scale(1.1);
        }

        .boi {
            --happiness: 0.9;
            --derp: 1;
            --px: 0.5;
            --py: 0.5;
            width: 26rem;
            max-width: 100%;
            height: 26rem;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #FFD4B2, #FFC09F, #FFAD87);
            border-radius: 100%;
            overflow: hidden;
            margin: 0;
            align-self: center;
            flex: 0 0 auto;
            border: solid 5px #E89F7B;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: boiFloat 4s ease-in-out infinite;
            will-change: transform;
            cursor: grab;
            user-select: none;
        }

        @keyframes boiFloat {
            0%, 100% { transform: translate(-50%, -50%) translateY(0px) rotate(0deg); }
            50% { transform: translate(-50%, -50%) translateY(-15px) rotate(2deg); }
        }

        .boi:hover {
            transform: translate(-50%, -50%) scale(1.2);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
        }

        .boi,
        .boi * {
            position: absolute;
        }

        .boi::before {
            content: '';
            display: block;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: linear-gradient(to bottom, #9DAAB6, rgba(157, 170, 182, 0));
            opacity: calc(1 - var(--happiness));
            transition: opacity 0.3s ease;
        }
        
        .boi.dragging {
            cursor: grabbing;
            animation: none !important;
            z-index: 1000;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.3);
            transition: none !important;
        }

        .boi-blush {
            width: 24%;
            height: 14%;
            background: radial-gradient(circle, rgba(255, 100, 100, 0.8), rgba(255, 100, 100, 0.3));
            border: 3px solid rgba(255, 100, 100, 0.5);
            top: calc(45% + var(--py) * 10%);
            border-radius: 100%;
            opacity: calc(var(--happiness) * var(--happiness) * 0.9 + 0.1);
            animation: blushPulse 2.5s ease-in-out infinite;
        }

        @keyframes blushPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .boi-blush-left {
            left: calc(5% + var(--px) * 2%);
        }

        .boi-blush-right {
            right: calc(7% - var(--px) * 2%);
        }

        .boi-eye {
            width: calc(30% - var(--happiness) * 2%);
            height: calc(30% - var(--happiness) * 2%);
            background: radial-gradient(circle, #ffffff, #f8f9fa);
            border-radius: 100%;
            top: calc(20% + var(--py) * 10%);
            overflow: hidden;
            border: 3px solid #6B6B6B;
            box-shadow: inset 0 3px 6px rgba(0, 0, 0, 0.1);
            animation: eyeBlink 6s ease-in-out infinite;
            will-change: transform;
            transition: all 0.2s ease-out;
        }

        @keyframes eyeBlink {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0.1); }
        }

        .boi-eye-left {
            left: calc(16% + var(--px) * 4%);
        }

        .boi-eye-left::after {
            transform: translate(calc((var(--px) + var(--derp) * 0.5) * 100%), calc((var(--py) + var(--derp) * 0.5) * 100%));
        }

        .boi-eye-right {
            right: calc(20% - var(--px) * 4%);
        }

        .boi-eye-right::after {
            transform: translate(calc((var(--px) + var(--derp) * -0.3) * 100%), calc((var(--py) + var(--derp) * -0.3) * 100%));
        }

        .boi-eye::after {
            content: '';
            display: block;
            background: radial-gradient(circle, #2d3436, #636e72);
            width: calc(60% - var(--happiness) * 10%);
            height: calc(60% - var(--happiness) * 10%);
            border-radius: 100%;
            transition: all 0.4s ease;
        }

        .boi-eye::before {
            content: '';
            display: block;
            background: rgba(255, 255, 255, 0.9);
            width: 35%;
            height: 35%;
            border-radius: 100%;
            top: 20%;
            left: 20%;
            z-index: 1;
            animation: eyeShine 3s ease-in-out infinite;
        }

        @keyframes eyeShine {
            0%, 100% { opacity: 0.9; }
            50% { opacity: 1; }
        }

        .boi-mouth {
            width: calc(55% - var(--happiness) * 2%);
            height: calc(30% - var(--happiness) * 2%);
            background: linear-gradient(135deg, #FF8B8B, #FF6B6B);
            border-radius: calc((1 - var(--happiness)) * 10em) calc((1 - var(--happiness)) * 10em) calc(var(--happiness) * 20em) calc(var(--happiness) * 20em);
            top: calc(55% + var(--py) * 5%);
            left: calc(47.5% + var(--px) * 5%);
            transform: translateX(-50%);
            overflow: hidden;
            border: 4px solid #E85555;
            box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform, border-radius;
        }

        .boi-mouth::before {
            content: '';
            display: block;
            position: absolute;
            width: 30%;
            height: 30%;
            top: 0;
            left: 50%;
            background: linear-gradient(135deg, #ffffff, #f8f9fa);
            border-radius: 0 0 1rem 1rem;
            transform: translateX(-50%);
        }

        .boi-mouth::after {
            content: '';
            display: block;
            position: absolute;
            width: 70%;
            height: 60%;
            left: 15%;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 25rem 25rem 0 0;
        }

        .hidden {
            display: none !important;
        }

        /* Enhanced shake animation */
        .mega-shake {
            animation: megaShake 0.8s ease-in-out;
        }

        @keyframes megaShake {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            10% { transform: translateX(-15px) rotate(-5deg); }
            20% { transform: translateX(15px) rotate(5deg); }
            30% { transform: translateX(-12px) rotate(-3deg); }
            40% { transform: translateX(12px) rotate(3deg); }
            50% { transform: translateX(-8px) rotate(-2deg); }
            60% { transform: translateX(8px) rotate(2deg); }
            70% { transform: translateX(-5px) rotate(-1deg); }
            80% { transform: translateX(5px) rotate(1deg); }
            90% { transform: translateX(-2px) rotate(0deg); }
        }

        /* Enhanced pulse animation */
        .mega-pulse {
            animation: megaPulse 0.8s ease-in-out;
        }

        @keyframes megaPulse {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.3); }
            50% { transform: scale(1.1); }
            75% { transform: scale(1.2); }
        }

        /* Enhanced confetti */
        .confetti {
            position: fixed;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: confetti-fall 4s linear forwards;
            z-index: 1000;
        }

        @keyframes confetti-fall {
            0% { transform: translateY(-100vh) rotate(0deg) scale(1); }
            50% { transform: translateY(50vh) rotate(180deg) scale(1.2); }
            100% { transform: translateY(100vh) rotate(360deg) scale(0.8); }
        }

        /* Fireworks effect */
        .firework {
            position: fixed;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            animation: firework 2s ease-out forwards;
            z-index: 1000;
        }

        @keyframes firework {
            0% { transform: scale(0); opacity: 1; }
            50% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        /* Enhanced sound wave */
        .sound-wave {
            position: absolute;
            top: 5%;
            right: 5%;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 1rem 1.5rem;
            background: rgba(157, 170, 182, 0.15);
            border-radius: 1.5rem;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .sound-bar {
            width: 5px;
            height: 25px;
            background: linear-gradient(135deg, #9DAAB6, #8A98A5, #778694);
            border-radius: 3px;
            animation: soundWave 1.2s ease-in-out infinite;
        }

        .sound-bar:nth-child(1) { animation-delay: 0s; }
        .sound-bar:nth-child(2) { animation-delay: 0.1s; }
        .sound-bar:nth-child(3) { animation-delay: 0.2s; }
        .sound-bar:nth-child(4) { animation-delay: 0.3s; }
        .sound-bar:nth-child(5) { animation-delay: 0.4s; }

        @keyframes soundWave {
            0%, 100% { height: 25px; }
            50% { height: 50px; }
        }

        /* Enhanced reaction counter */
        .reaction-counter {
            position: absolute;
            top: 5%;
            left: 5%;
            background: rgba(157, 170, 182, 0.25);
            padding: 1.5rem 2.5rem;
            border-radius: 1.5rem;
            font-weight: 700;
            color: #2c3e50;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .reaction-counter:hover {
            transform: scale(1.05) rotate(1deg);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            background: rgba(157, 170, 182, 0.35);
        }

        /* Enhanced success particles */
        .success-particle {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
            animation: successParticle 2s ease-out forwards;
            --tx: 0px;
            --ty: 0px;
        }

        @keyframes successParticle {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        /* Enhanced tooltip */
        .tooltip {
            position: absolute;
            background: rgba(44, 62, 80, 0.95);
            color: white;
            padding: 1rem 2rem;
            border-radius: 1rem;
            font-size: 1.4rem;
            pointer-events: none;
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .tooltip.show {
            opacity: 1;
            transform: scale(1.1);
        }


        /* Lightning effect */
        .lightning {
            position: fixed;
            width: 2px;
            height: 100vh;
            background: linear-gradient(to bottom, #fff, #9DAAB6, transparent);
            animation: lightning 0.2s ease-out;
            z-index: 1000;
        }

        @keyframes lightning {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* Mobile responsiveness */
        @media (max-width: 768px) {
            .confirm, .accepted, .rejected {
                width: 95%;
                height: 85%;
            }
            
            .boi {
                width: 20rem;
                height: 20rem;
            }
            
            .confirm-body-title,
            .accepted-body-title,
            .rejected-body-title {
                font-size: 2.5rem;
            }
            
            .confirm-body-button {
                padding: 1.5rem 3rem;
                font-size: 1.8rem;
            }
        }

        /* Glowing border effect */
        .glow-border {
            animation: glowBorder 2s ease-in-out infinite;
        }

        @keyframes glowBorder {
            0%, 100% { box-shadow: 0 0 20px rgba(78, 205, 196, 0.3); }
            50% { box-shadow: 0 0 40px rgba(78, 205, 196, 0.8); }
        }

        /* Typing effect */
        .typing-effect {
            overflow: hidden;
            white-space: nowrap;
            animation: typing 3s steps(40, end), blink 1s infinite;
        }

        @keyframes typing {
            0% { width: 0; }
            100% { width: 100%; }
        }

        @keyframes blink {
            0%, 50% { border-right: 2px solid; }
            51%, 100% { border-right: 2px solid transparent; }
        }

        /* Magnetic effect */
        .magnetic {
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .magnetic:hover {
            transform: scale(1.1);
        }

        /* Explosion effect */
        .explosion {
            position: fixed;
            width: 10px;
            height: 10px;
            background: radial-gradient(circle, #E5D0CC, #D4A5A5);
            border-radius: 50%;
            animation: explosion 1s ease-out forwards;
            z-index: 1000;
        }

        @keyframes explosion {
            0% { transform: scale(0); opacity: 1; }
            50% { transform: scale(20); opacity: 0.8; }
            100% { transform: scale(40); opacity: 0; }
        }
        
        /* Drag trail effect */
        .drag-trail {
            position: fixed;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 212, 178, 0.7), rgba(255, 173, 135, 0.3), transparent);
            pointer-events: none;
            animation: trailFade 0.6s ease-out forwards;
            z-index: 999;
            will-change: transform, opacity;
        }
        
        @keyframes trailFade {
            0% { transform: scale(1) translate(-50%, -50%); opacity: 0.9; }
            100% { transform: scale(0.2) translate(-50%, -50%); opacity: 0; }
        }
    </style>
</head>
<body>
    <!-- Enhanced animated background -->
    <div class="particles" id="particles"></div>
    <div class="wave"></div>
    <div class="matrix-rain" id="matrixRain"></div>
    
    <!-- Tooltip -->
    <div class="tooltip" id="tooltip"></div>

    <!-- 初始界面 -->
    <section class="confirm">
        <div class="reaction-counter" id="reactionCounter">
            拒绝次数: <span id="rejectCount">0</span> 次 😤
        </div>
        <div class="sound-wave">
            <div class="sound-bar"></div>
            <div class="sound-bar"></div>
            <div class="sound-bar"></div>
            <div class="sound-bar"></div>
            <div class="sound-bar"></div>
        </div>
        <div class="confirm-body">
            <h2 class="confirm-body-title">学生向您发送了一封请假条</h2>
            <h3 class="confirm-body-subtitle">希望导员能够批假，是否接受？</h3>
            <figure class="boi magnetic" id="boi" style="--happiness:0.9; --derp:1; --px:0.5; --py:0.5;">
                <div class="boi-blush boi-blush-left"></div>
                <div class="boi-blush boi-blush-right"></div>
                <div class="boi-eye boi-eye-left"></div>
                <div class="boi-eye boi-eye-right"></div>
                <div class="boi-mouth"></div>
            </figure>
            <button class="confirm-body-button confirm-body-button-cancel magnetic" id="acceptBtn">
                ✅ 接受
            </button>
            <button class="confirm-body-button confirm-body-button-delete magnetic" id="rejectBtn">
                ❌ 拒绝
            </button>
        </div>
    </section>

    <!-- 接受后的新界面 -->
    <section class="accepted hidden" id="acceptedSection">
        <div class="accepted-body">
            <h2 class="accepted-body-title">🎉 感谢导员批假！🎉</h2>
            <h3 class="accepted-body-subtitle">小树非常开心，祝导员幸福快乐！💖</h3>
            <figure class="boi magnetic" style="--happiness:1; --derp:0; --px:0.5; --py:0.5;">
                <div class="boi-blush boi-blush-left"></div>
                <div class="boi-blush boi-blush-right"></div>
                <div class="boi-eye boi-eye-left"></div>
                <div class="boi-eye boi-eye-right"></div>
                <div class="boi-mouth"></div>
            </figure>
            <button class="accepted-body-button magnetic" id="returnFromAccepted">
                🔄 返回
            </button>
        </div>
    </section>

    <!-- 拒绝后的新界面 -->
    <section class="rejected hidden" id="rejectedSection">
        <div class="rejected-body">
            <h2 class="rejected-body-title">😢 小树有点难过...</h2>
            <h3 class="rejected-body-subtitle">但小树尊重你的决定，祝你一切顺利！💙</h3>
            <figure class="boi magnetic" style="--happiness:0.2; --derp:0; --px:0.5; --py:0.5;">
                <div class="boi-blush boi-blush-left"></div>
                <div class="boi-blush boi-blush-right"></div>
                <div class="boi-eye boi-eye-left"></div>
                <div class="boi-eye boi-eye-right"></div>
                <div class="boi-mouth"></div>
            </figure>
            <button class="rejected-body-button magnetic" id="returnFromRejected">
                💔 返回
            </button>
        </div>
    </section>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
    // Element selections
    const confirmSection = document.querySelector('.confirm');
    const acceptedSection = document.getElementById('acceptedSection');
    const rejectedSection = document.getElementById('rejectedSection');
    const boi = document.getElementById('boi');
    const acceptBtn = document.getElementById('acceptBtn');
    const rejectBtn = document.getElementById('rejectBtn');
    const returnFromAcceptedBtn = document.getElementById('returnFromAccepted');
    const returnFromRejectedBtn = document.getElementById('returnFromRejected');
    const rejectCountSpan = document.getElementById('rejectCount');
    const reactionCounter = document.getElementById('reactionCounter');
    const tooltip = document.getElementById('tooltip');
    const particlesContainer = document.getElementById('particles');
    const matrixContainer = document.getElementById('matrixRain');

    // State variables
    const current = { happiness: 0.9, derp: 1, px: 0.5, py: 0.5 };
    const target = { ...current };
    let rejectCount = 0;
    const REJECT_THRESHOLD_FOR_ESCAPE = 3;
    
    // Drag state
    let isDragging = false;
    let dragOffsetX = 0;  // 鼠标相对于表情中心的偏移X
    let dragOffsetY = 0;  // 鼠标相对于表情中心的偏移Y
    let targetBoiX = 0;   // 目标X位置
    let targetBoiY = 0;   // 目标Y位置
    let rafId = null;     // requestAnimationFrame ID

    // --- Core Logic ---

    function updateBoi() {
        for (let prop in target) {
            if (Math.abs(target[prop] - current[prop]) < 0.001) {
                current[prop] = target[prop];
            } else {
                // 优化响应速度：happiness和眼睛位置更快响应
                const speed = prop === 'happiness' ? 0.35 : (prop === 'px' || prop === 'py') ? 0.25 : 0.15;
                current[prop] += (target[prop] - current[prop]) * speed;
            }
            boi.style.setProperty(`--${prop}`, current[prop]);
        }
        requestAnimationFrame(updateBoi);
    }

    function resetState() {
        acceptedSection.classList.add('hidden');
        rejectedSection.classList.add('hidden');
        confirmSection.classList.remove('hidden');

        target.happiness = 0.9;
        target.derp = 1;
        target.px = 0.5;
        target.py = 0.5;
        
        rejectCount = 0;
        rejectCountSpan.textContent = rejectCount;
        reactionCounter.classList.remove('mega-shake');
        
        acceptBtn.style.transform = 'scale(1)';
        
        rejectBtn.style.position = 'relative';
        rejectBtn.style.left = '0px';
        rejectBtn.style.top = '0px';
        rejectBtn.style.transition = 'all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
        
        // 重置表情位置
        boi.style.left = '50%';
        boi.style.top = '50%';
        boi.style.transform = 'translate(-50%, -50%)';
        boi.style.animation = 'boiFloat 4s ease-in-out infinite';
        isDragging = false;
        boi.classList.remove('dragging');
    }

    // --- Event Listeners ---

    confirmSection.addEventListener('mousemove', onMouseMove);
    confirmSection.addEventListener('mouseleave', onMouseLeave);

    acceptBtn.addEventListener('click', onAccept);
    rejectBtn.addEventListener('click', onReject);
    
    returnFromAcceptedBtn.addEventListener('click', resetState);
    returnFromRejectedBtn.addEventListener('click', resetState);

    // Add tooltips
    acceptBtn.addEventListener('mouseenter', e => showTooltip(e.target, '点击接受，开启快乐！'));
    rejectBtn.addEventListener('mouseenter', e => showTooltip(e.target, '三思而后行哦...'));
    acceptBtn.addEventListener('mouseleave', hideTooltip);
    rejectBtn.addEventListener('mouseleave', hideTooltip);
    
    // 增加表情交互 - 点击表情会有惊喜（不是拖拽时）
    let clickStartPos = { x: 0, y: 0 };
    
    boi.addEventListener('mousedown', (e) => {
        clickStartPos.x = e.clientX;
        clickStartPos.y = e.clientY;
    });
    
    boi.addEventListener('click', (e) => {
        // 只有在没有拖拽时才触发点击效果
        const moveDistance = Math.sqrt(
            Math.pow(e.clientX - clickStartPos.x, 2) + 
            Math.pow(e.clientY - clickStartPos.y, 2)
        );
        
        if (moveDistance < 5) { // 移动距离小于5px才算点击
            boi.classList.remove('mega-pulse');
            void boi.offsetWidth;
            boi.classList.add('mega-pulse');
            createSuccessParticles(15, boi.getBoundingClientRect());
        }
    });
    
    // 鼠标悬停表情时的交互提示
    boi.addEventListener('mouseenter', () => {
        if (!isDragging) {
            showTooltip(boi, '可以拖动我哦！');
        }
    });
    
    boi.addEventListener('mouseleave', () => {
        if (!isDragging) {
            hideTooltip();
        }
    });
    
    // 拖拽功能
    boi.addEventListener('mousedown', startDrag);
    document.addEventListener('mousemove', drag);
    document.addEventListener('mouseup', stopDrag);
    
    // 触摸支持
    boi.addEventListener('touchstart', startDragTouch);
    document.addEventListener('touchmove', dragTouch);
    document.addEventListener('touchend', stopDrag);

    // --- Drag Handlers ---
    
    let trailCounter = 0;
    
    function startDrag(e) {
        e.preventDefault();
        e.stopPropagation();
        
        // 计算鼠标点击位置相对于表情中心的偏移
        const rect = boi.getBoundingClientRect();
        const boiCenterX = rect.left + rect.width / 2;
        const boiCenterY = rect.top + rect.height / 2;
        
        dragOffsetX = e.clientX - boiCenterX;
        dragOffsetY = e.clientY - boiCenterY;
        
        // 记录起始位置，用于判断是点击还是拖拽
        const startX = e.clientX;
        const startY = e.clientY;
        
        const onFirstMove = (moveEvent) => {
            const dx = moveEvent.clientX - startX;
            const dy = moveEvent.clientY - startY;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            // 移动超过5px才开始拖拽
            if (distance > 5) {
                document.removeEventListener('mousemove', onFirstMove);
                
                isDragging = true;
                
                boi.classList.add('dragging');
                hideTooltip();
                
                // 停止浮动动画
                boi.style.animation = 'none';
                
                // 初始化目标位置（鼠标位置减去偏移）
                targetBoiX = moveEvent.clientX - dragOffsetX;
                targetBoiY = moveEvent.clientY - dragOffsetY;
                
                // 启动拖拽渲染循环
                if (rafId) cancelAnimationFrame(rafId);
                rafId = requestAnimationFrame(updateDragPosition);
            }
        };
        
        document.addEventListener('mousemove', onFirstMove);
        
        // 如果鼠标很快抬起，取消监听
        const onMouseUpEarly = () => {
            document.removeEventListener('mousemove', onFirstMove);
            document.removeEventListener('mouseup', onMouseUpEarly);
        };
        document.addEventListener('mouseup', onMouseUpEarly, { once: true });
    }
    
    function startDragTouch(e) {
        e.preventDefault();
        e.stopPropagation();
        
        const touch = e.touches[0];
        
        // 计算触摸位置相对于表情中心的偏移
        const rect = boi.getBoundingClientRect();
        const boiCenterX = rect.left + rect.width / 2;
        const boiCenterY = rect.top + rect.height / 2;
        
        dragOffsetX = touch.clientX - boiCenterX;
        dragOffsetY = touch.clientY - boiCenterY;
        
        isDragging = true;
        
        boi.classList.add('dragging');
        hideTooltip();
        boi.style.animation = 'none';
        
        // 初始化目标位置
        targetBoiX = touch.clientX - dragOffsetX;
        targetBoiY = touch.clientY - dragOffsetY;
        
        // 启动拖拽渲染循环
        if (rafId) cancelAnimationFrame(rafId);
        rafId = requestAnimationFrame(updateDragPosition);
    }
    
    function updateDragPosition() {
        if (!isDragging) return;
        
        // 直接设置位置，无延迟
        boi.style.left = `${targetBoiX}px`;
        boi.style.top = `${targetBoiY}px`;
        boi.style.transform = 'translate(-50%, -50%) scale(1.1)';
        
        // 创建拖拽轨迹
        trailCounter++;
        if (trailCounter % 2 === 0) {
            createDragTrail(targetBoiX, targetBoiY);
        }
        
        rafId = requestAnimationFrame(updateDragPosition);
    }
    
    function drag(e) {
        if (!isDragging) return;
        e.preventDefault();
        
        // 更新目标位置（鼠标位置减去偏移，保持相对位置）
        targetBoiX = e.clientX - dragOffsetX;
        targetBoiY = e.clientY - dragOffsetY;
    }
    
    function dragTouch(e) {
        if (!isDragging) return;
        e.preventDefault();
        
        const touch = e.touches[0];
        
        // 更新目标位置（触摸位置减去偏移）
        targetBoiX = touch.clientX - dragOffsetX;
        targetBoiY = touch.clientY - dragOffsetY;
    }
    
    function stopDrag(e) {
        if (!isDragging) return;
        
        isDragging = false;
        boi.classList.remove('dragging');
        
        // 停止拖拽渲染循环
        if (rafId) {
            cancelAnimationFrame(rafId);
            rafId = null;
        }
        
        // 创建拖拽完成特效
        createSuccessParticles(8, boi.getBoundingClientRect());
        
        // 恢复浮动动画
        setTimeout(() => {
            boi.style.animation = 'boiFloat 4s ease-in-out infinite';
        }, 100);
    }

    // --- Event Handlers ---

    function onMouseMove(e) {
        if (isDragging) return; // 拖拽时不处理眼睛跟随
        
        const { clientX: x, clientY: y } = e;
        const rect = confirmSection.getBoundingClientRect();
        
        // Boi expression logic
        const dxAccept = x - (acceptBtn.getBoundingClientRect().x + acceptBtn.offsetWidth / 2);
        const dyAccept = y - (acceptBtn.getBoundingClientRect().y + acceptBtn.offsetHeight / 2);
        const distAccept = Math.sqrt(dxAccept * dxAccept + dyAccept * dyAccept);

        const dxReject = x - (rejectBtn.getBoundingClientRect().x + rejectBtn.offsetWidth / 2);
        const dyReject = y - (rejectBtn.getBoundingClientRect().y + rejectBtn.offsetHeight / 2);
        const distReject = Math.sqrt(dxReject * dxReject + dyReject * dyReject);
        
        target.happiness = Math.pow(distReject / (distAccept + distReject), 0.75);
        target.derp = 0;
        target.px = (x - rect.left) / rect.width;
        target.py = (y - rect.top) / rect.height;

        // Reject button escape logic
        if (rejectCount >= REJECT_THRESHOLD_FOR_ESCAPE) {
            const escapeDist = 120;
            const rejectRect = rejectBtn.getBoundingClientRect();
            const rejectCenterX = rejectRect.left + rejectRect.width / 2;
            const rejectCenterY = rejectRect.top + rejectRect.height / 2;
            const dist = Math.sqrt(Math.pow(x - rejectCenterX, 2) + Math.pow(y - rejectCenterY, 2));

            if (dist < escapeDist) {
                // 当鼠标接近时，随机跳到页面上的新位置
                const parentRect = confirmSection.getBoundingClientRect();
                
                // 确保按钮不会移出容器边界
                const maxX = parentRect.width - rejectRect.width - 20;
                const maxY = parentRect.height - rejectRect.height - 20;
                
                // 随机新位置，避免靠近屏幕边缘
                let newX, newY;
                do {
                    newX = 20 + Math.random() * maxX;
                    newY = 20 + Math.random() * maxY;
                    // 确保新位置离鼠标足够远
                } while (Math.sqrt(Math.pow(newX - (x - rect.left), 2) + Math.pow(newY - (y - rect.top), 2)) < 150);
                
                // 应用新位置，带有弹跳效果
                rejectBtn.style.transition = 'all 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55)';
                rejectBtn.style.left = `${newX}px`;
                rejectBtn.style.top = `${newY}px`;
                
                // 随机旋转一点点
                const rotation = Math.random() * 20 - 10; // -10 到 10 度之间
                rejectBtn.style.transform = `rotate(${rotation}deg)`;
                
                setTimeout(() => {
                    rejectBtn.style.transform = 'rotate(0deg)';
                }, 300);
            }
        }
        
        // Magnetic effect for all magnetic elements
        document.querySelectorAll('.magnetic').forEach(el => {
            const elRect = el.getBoundingClientRect();
            const elCenterX = elRect.left + elRect.width / 2;
            const elCenterY = elRect.top + elRect.height / 2;
            
            const magDist = 200;
            const dist = Math.sqrt(Math.pow(x - elCenterX, 2) + Math.pow(y - elCenterY, 2));
            
            if (dist < magDist) {
                const dx = x - elCenterX;
                const dy = y - elCenterY;
                el.style.transform = `translate(${dx * 0.1}px, ${dy * 0.1}px) scale(1.05)`;
            } else {
                 el.style.transform = 'translate(0, 0) scale(1)';
            }
        });
    }

    function onMouseLeave() {
        target.happiness = 0.9;
        target.derp = 1;
        target.px = 0.5;
        target.py = 0.5;
        
        document.querySelectorAll('.magnetic').forEach(el => {
             el.style.transform = 'translate(0, 0) scale(1)';
        });
    }

    function onAccept() {
        confirmSection.classList.add('hidden');
        acceptedSection.classList.remove('hidden');
        target.happiness = 1;
        createConfettiShower(80);
        createFireworks(12);
        playSound('success');
    }

    function onReject() {
        rejectCount++;
        rejectCountSpan.textContent = rejectCount;
        reactionCounter.classList.remove('mega-shake');
        void reactionCounter.offsetWidth; // Trigger reflow
        reactionCounter.classList.add('mega-shake');
        
        target.happiness = Math.max(0, target.happiness - 0.2);
        
        acceptBtn.classList.remove('mega-pulse');
        void acceptBtn.offsetWidth;
        acceptBtn.classList.add('mega-pulse');
        acceptBtn.style.transform = `scale(${1 + rejectCount * 0.15})`;

        createLightning();
        playSound('reject');

        if (rejectCount >= REJECT_THRESHOLD_FOR_ESCAPE) {
            rejectBtn.style.position = 'absolute';
            rejectBtn.style.transition = 'all 0.2s ease-out';
            
            // 随机移动到页面上的新位置
            const parentRect = confirmSection.getBoundingClientRect();
            const btnRect = rejectBtn.getBoundingClientRect();
            
            // 确保按钮不会移出容器边界
            const maxX = parentRect.width - btnRect.width - 20;
            const maxY = parentRect.height - btnRect.height - 20;
            
            // 随机新位置，避免靠近屏幕边缘
            const newX = 20 + Math.random() * maxX;
            const newY = 20 + Math.random() * maxY;
            
            // 应用新位置
            rejectBtn.style.left = `${newX}px`;
            rejectBtn.style.top = `${newY}px`;
            
            showTooltip(rejectBtn, '想拒绝？没那么容易！🤪');
            setTimeout(hideTooltip, 1500);
        }

        if(rejectCount > 5) {
            createExplosion(rejectBtn.getBoundingClientRect().x, rejectBtn.getBoundingClientRect().y);
        }
    }
    
    // --- Visual Effects ---

    function createParticles(count) {
        for (let i = 0; i < count; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = `${Math.random() * 100}vw`;
            particle.style.top = `${Math.random() * 100}vh`;
            particle.style.width = `${Math.random() * 3 + 1}px`;
            particle.style.height = particle.style.width;
            particle.style.animationDuration = `${Math.random() * 4 + 4}s`;
            particle.style.animationDelay = `${Math.random() * 2}s`;
            particlesContainer.appendChild(particle);
        }
    }

    function createMatrixRain(count) {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        for (let i = 0; i < count; i++) {
            const char = document.createElement('div');
            char.className = 'matrix-char';
            char.textContent = chars[Math.floor(Math.random() * chars.length)];
            char.style.left = `${Math.random() * 100}vw`;
            char.style.animationDuration = `${Math.random() * 3 + 2}s`;
            char.style.animationDelay = `${Math.random() * 5}s`;
            matrixContainer.appendChild(char);
        }
    }
    
    // 移除浮动emoji功能以优化性能

    function createConfettiShower(count = 100) {
        const colors = ['#E5D0CC', '#9DAAB6', '#B8C5B4', '#D4A5A5', '#C7C5C0'];
        for (let i = 0; i < count; i++) {
            setTimeout(() => {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = `${Math.random() * 100}vw`;
                confetti.style.top = `${-20 + Math.random() * -100}px`;
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                confetti.style.animationDuration = `${Math.random() * 3 + 2}s`;
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 4000);
            }, i * 15);
        }
    }

    function createFireworks(count) {
        const colors = ['#E5D0CC', '#9DAAB6', '#B8C5B4', '#D4A5A5', '#C7C5C0'];
        for (let i = 0; i < count; i++) {
             setTimeout(() => {
                const fireworkContainer = document.createElement('div');
                fireworkContainer.style.position = 'fixed';
                fireworkContainer.style.left = `${Math.random() * 100}vw`;
                fireworkContainer.style.top = `${Math.random() * 50 + 20}vh`;
                document.body.appendChild(fireworkContainer);

                for (let j = 0; j < 25; j++) {
                    const firework = document.createElement('div');
                    firework.className = 'firework';
                    firework.style.background = colors[Math.floor(Math.random() * colors.length)];
                    const angle = Math.random() * Math.PI * 2;
                    const distance = Math.random() * 100;
                    firework.style.transform = `rotate(${angle}rad) translateX(${distance}px)`;
                    firework.style.animation = `firework-particle ${Math.random() * 1 + 0.5}s ease-out forwards`;
                    fireworkContainer.appendChild(firework);
                }
                
                setTimeout(() => fireworkContainer.remove(), 1800);
             }, Math.random() * 1200);
        }
    }
    
    // Add firework particle keyframes to the stylesheet
    const styleSheet = document.createElement("style");
    styleSheet.type = "text/css";
    styleSheet.innerText = `
        @keyframes firework-particle {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0) translate(100px); opacity: 0; }
        }
    `;
    document.head.appendChild(styleSheet);


    // 移除心形雨效果（emoji性能优化）
    
    function createSuccessParticles(count, rect) {
        const colors = ['#B8C5B4', '#9DAAB6', '#E5D0CC', '#D4A5A5'];
        for (let i = 0; i < count; i++) {
            const particle = document.createElement('div');
            particle.className = 'success-particle';
            particle.style.left = `${rect.left + rect.width / 2}px`;
            particle.style.top = `${rect.top + rect.height / 2}px`;
            particle.style.background = colors[Math.floor(Math.random() * colors.length)];
            const angle = Math.random() * Math.PI * 2;
            const distance = Math.random() * 100 + 50;
            particle.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
            particle.style.setProperty('--ty', `${Math.sin(angle) * distance}px`);
            document.body.appendChild(particle);
            setTimeout(() => particle.remove(), 2500);
        }
    }
    
    function createLightning() {
        const lightning = document.createElement('div');
        lightning.className = 'lightning';
        lightning.style.left = `${Math.random() * 100}vw`;
        document.body.appendChild(lightning);
        setTimeout(() => lightning.remove(), 200);
    }
    
    function createExplosion(x, y) {
        const explosion = document.createElement('div');
        explosion.className = 'explosion';
        explosion.style.left = `${x}px`;
        explosion.style.top = `${y}px`;
        document.body.appendChild(explosion);
        setTimeout(() => explosion.remove(), 1000);
    }
    
    function createDragTrail(x, y) {
        const trail = document.createElement('div');
        trail.className = 'drag-trail';
        trail.style.left = `${x}px`;
        trail.style.top = `${y}px`;
        trail.style.transform = 'translate(-50%, -50%)';
        document.body.appendChild(trail);
        setTimeout(() => trail.remove(), 600);
    }

    function showTooltip(element, text) {
        const rect = element.getBoundingClientRect();
        tooltip.textContent = text;
        tooltip.style.left = `${rect.left + rect.width / 2 - tooltip.offsetWidth / 2}px`;
        tooltip.style.top = `${rect.top - tooltip.offsetHeight - 10}px`;
        tooltip.classList.add('show');
    }

    function hideTooltip() {
        tooltip.classList.remove('show');
    }
    
    // Mock play sound function
    function playSound(type) {
        const soundWave = document.querySelector('.sound-wave');
        if (!soundWave) return;
        
        soundWave.classList.remove('mega-pulse');
        void soundWave.offsetWidth;
        soundWave.classList.add('mega-pulse');

        const bars = soundWave.querySelectorAll('.sound-bar');
        if(type === 'success') {
            bars.forEach(bar => bar.style.background = 'linear-gradient(135deg, #B8C5B4, #A8B9A5, #98AA95)');
        } else {
            bars.forEach(bar => bar.style.background = 'linear-gradient(135deg, #D4A5A5, #C19A9A, #B08888)');
        }
    }

    // --- Initialization ---
    createParticles(20); // 减少粒子数量以优化性能
    createMatrixRain(10); // 减少矩阵雨数量
    updateBoi();
    resetState();
});
    </script>
</body>
</html>
