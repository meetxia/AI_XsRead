<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今天你摸鱼了吗? 🐟</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@300;400;700&display=swap');
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 62.5%;
        }

        @media screen and (max-width: 480px) {
            html {
                font-size: 50%;
            }
        }

        body {
            font-size: 2rem;
            font-family: 'Noto Sans SC', sans-serif;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #8B6F47 0%, #C4A37A 50%, #D4B896 100%);
            position: relative;
        }

        /* 动态背景波浪 */
        .wave-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 150px;
            overflow: hidden;
            z-index: 0;
        }

        .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 200%;
            height: 100%;
            background: linear-gradient(90deg, rgba(139, 111, 71, 0.3), rgba(196, 163, 122, 0.3));
            animation: waveMove 8s linear infinite;
            will-change: transform;
        }

        .wave:nth-child(2) {
            animation-delay: -2s;
            opacity: 0.5;
        }

        @keyframes waveMove {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* 漂浮的摸鱼道具 */
        .floating-item {
            position: fixed;
            font-size: 3rem;
            pointer-events: none;
            animation: floatAway 4s ease-out forwards;
            z-index: 100;
        }

        @keyframes floatAway {
            0% { 
                transform: translateY(0) rotate(0deg) scale(1);
                opacity: 1;
            }
            100% { 
                transform: translateY(-80vh) rotate(360deg) scale(0.3);
                opacity: 0;
            }
        }

        /* 主容器 */
        .main-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90rem;
            max-width: 95%;
            height: 70rem;
            max-height: 95%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 3rem;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
            border: 3px solid rgba(255, 255, 255, 0.5);
            padding: 4rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            animation: slideIn 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 10;
            overflow: hidden;
        }

        @keyframes slideIn {
            from { 
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 0;
            }
            to { 
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        .hidden {
            display: none !important;
        }

        /* 标题区域 */
        .title {
            font-family: 'ZCOOL KuaiLe', cursive;
            font-size: 3.6rem;
            color: #7A5C3F;
            text-shadow: 2px 2px 4px rgba(139, 111, 71, 0.3);
            margin-bottom: 1rem;
            animation: titleBounce 2s ease-in-out infinite;
            text-align: center;
        }

        @keyframes titleBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .subtitle {
            font-size: 2rem;
            color: #9B7E5C;
            margin-bottom: 2rem;
            text-align: center;
        }

        /* 状态栏 */
        .status-bar {
            position: absolute;
            top: 2rem;
            right: 2rem;
            background: rgba(102, 126, 234, 0.2);
            padding: 1.5rem 2.5rem;
            border-radius: 2rem;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            font-weight: 700;
            color: #667eea;
            transition: all 0.3s ease;
        }

        .status-bar:hover {
            transform: scale(1.05);
            background: rgba(102, 126, 234, 0.3);
        }

        /* 时间条 */
        .time-bar {
            position: absolute;
            top: 2rem;
            left: 2rem;
            background: rgba(118, 75, 162, 0.2);
            padding: 1.5rem 2.5rem;
            border-radius: 2rem;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            font-weight: 700;
            color: #764ba2;
        }

        /* 打工人表情 */
        .worker-face {
            width: 28rem;
            height: 28rem;
            background: linear-gradient(135deg, #FFE5B4, #FFD700, #FFA500);
            border-radius: 50%;
            position: relative;
            border: 5px solid #FF8C00;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            animation: workerFloat 3s ease-in-out infinite;
            cursor: grab;
            transition: all 0.3s ease;
            --happiness: 0.5;
            --tired: 0;
            --px: 0.5;
            --py: 0.5;
        }

        @keyframes workerFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }

        .worker-face:hover {
            transform: scale(1.1);
        }

        .worker-face.dragging {
            cursor: grabbing;
            animation: none;
            z-index: 1000;
        }

        /* 眼睛 */
        .eye {
            position: absolute;
            width: 5rem;
            height: 5rem;
            background: white;
            border-radius: 50%;
            top: calc(35% + var(--py) * 10%);
            border: 3px solid #333;
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .eye-left {
            left: calc(22% + var(--px) * 5%);
        }

        .eye-right {
            right: calc(22% - var(--px) * 5%);
        }

        .pupil {
            position: absolute;
            width: 50%;
            height: 50%;
            background: radial-gradient(circle, #000, #333);
            border-radius: 50%;
            top: 25%;
            left: 25%;
            transition: all 0.15s ease;
        }

        /* 疲惫效果 - 眯眯眼 */
        .eye.tired {
            height: 1rem;
            animation: blink 3s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 90%, 100% { height: 5rem; }
            95% { height: 0.5rem; }
        }

        /* 嘴巴 */
        .mouth {
            position: absolute;
            width: calc(50% + var(--happiness) * 20%);
            height: calc(25% + var(--happiness) * 15%);
            background: linear-gradient(135deg, #FF6B6B, #FF5252);
            border-radius: calc((1 - var(--happiness)) * 5em) calc((1 - var(--happiness)) * 5em) 
                          calc(var(--happiness) * 15em) calc(var(--happiness) * 15em);
            bottom: 25%;
            left: 50%;
            transform: translateX(-50%);
            border: 3px solid #E53935;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .mouth::after {
            content: '';
            position: absolute;
            width: 70%;
            height: 50%;
            left: 15%;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20em 20em 0 0;
        }

        /* 汗滴 */
        .sweat {
            position: absolute;
            width: 2rem;
            height: 2.5rem;
            background: linear-gradient(135deg, rgba(100, 200, 255, 0.8), rgba(50, 150, 255, 0.6));
            border-radius: 50% 0 50% 50%;
            top: 20%;
            right: 15%;
            opacity: 0;
            animation: sweatDrop 2s ease-in-out infinite;
        }

        @keyframes sweatDrop {
            0%, 100% { opacity: 0; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(10px); }
        }

        /* 按钮容器 */
        .button-container {
            display: flex;
            gap: 3rem;
            margin-top: 2rem;
            position: relative;
        }

        .action-button {
            padding: 2rem 4rem;
            font-size: 2.2rem;
            font-weight: 700;
            border: none;
            border-radius: 2rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .action-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.6s;
        }

        .action-button:hover::before {
            left: 100%;
        }

        .moyu-button {
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            color: white;
            animation: moyuPulse 2s ease-in-out infinite;
        }

        @keyframes moyuPulse {
            0%, 100% { box-shadow: 0 10px 30px rgba(255, 107, 107, 0.3); }
            50% { box-shadow: 0 10px 40px rgba(255, 107, 107, 0.6); }
        }

        .moyu-button:hover {
            transform: scale(1.15) rotate(-2deg);
            background: linear-gradient(135deg, #FF8E53, #FF6B6B);
        }

        .work-button {
            background: linear-gradient(135deg, #4ECDC4, #44A08D);
            color: white;
        }

        .work-button:hover {
            transform: scale(1.1) rotate(2deg);
            background: linear-gradient(135deg, #44A08D, #4ECDC4);
        }

        .work-button.escaping {
            animation: buttonEscape 0.3s ease-out;
        }

        @keyframes buttonEscape {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(0.8) rotate(10deg); }
        }

        /* 老板角色 */
        .boss {
            position: fixed;
            width: 15rem;
            height: 15rem;
            background: linear-gradient(135deg, #E74C3C, #C0392B);
            border-radius: 50%;
            border: 4px solid #A93226;
            z-index: 1000;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            cursor: pointer;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }

        .boss.hidden {
            display: none;
        }

        .boss::before {
            content: '👔';
            position: absolute;
            font-size: 4rem;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .boss-eye {
            position: absolute;
            width: 3rem;
            height: 3rem;
            background: white;
            border-radius: 50%;
            top: 35%;
            border: 2px solid #000;
        }

        .boss-eye-left {
            left: 25%;
        }

        .boss-eye-right {
            right: 25%;
        }

        .boss-eye::after {
            content: '';
            position: absolute;
            width: 50%;
            height: 50%;
            background: #000;
            border-radius: 50%;
            top: 25%;
            left: 25%;
        }

        .boss-mouth {
            position: absolute;
            width: 40%;
            height: 20%;
            background: #000;
            bottom: 25%;
            left: 30%;
            border-radius: 0 0 20px 20px;
        }

        /* 警告文字 */
        .boss-warning {
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(231, 76, 60, 0.95);
            color: white;
            padding: 2rem 4rem;
            border-radius: 1.5rem;
            font-size: 2.5rem;
            font-weight: 700;
            z-index: 1001;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: warningShake 0.5s ease-in-out infinite;
        }

        @keyframes warningShake {
            0%, 100% { transform: translateX(-50%) rotate(0deg); }
            25% { transform: translateX(-50%) rotate(-3deg); }
            75% { transform: translateX(-50%) rotate(3deg); }
        }

        /* 成功界面 */
        .success-screen, .caught-screen, .offwork-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.98);
            z-index: 100;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .result-title {
            font-family: 'ZCOOL KuaiLe', cursive;
            font-size: 4.5rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        .result-subtitle {
            font-size: 2.5rem;
            margin-bottom: 3rem;
            text-align: center;
            color: #666;
        }

        .result-button {
            padding: 2rem 5rem;
            font-size: 2.2rem;
            font-weight: 700;
            border: none;
            border-radius: 2rem;
            cursor: pointer;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .result-button:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        /* 彩纸效果 */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: confettiFall 4s linear forwards;
            z-index: 1000;
        }

        @keyframes confettiFall {
            0% { transform: translateY(-100vh) rotate(0deg); }
            100% { transform: translateY(100vh) rotate(720deg); }
        }

        /* 雷电效果 */
        .lightning {
            position: fixed;
            width: 3px;
            height: 100vh;
            background: linear-gradient(to bottom, #fff, #E74C3C, transparent);
            animation: lightningFlash 0.2s ease-out;
            z-index: 999;
        }

        @keyframes lightningFlash {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        /* 进度条 */
        .progress-bar-container {
            width: 100%;
            max-width: 50rem;
            height: 3rem;
            background: rgba(118, 75, 162, 0.2);
            border-radius: 1.5rem;
            overflow: hidden;
            margin-bottom: 3rem;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
            border-radius: 1.5rem;
            transition: width 0.3s ease;
            animation: progressGlow 2s ease-in-out infinite;
        }

        @keyframes progressGlow {
            0%, 100% { box-shadow: 0 0 10px rgba(102, 126, 234, 0.5); }
            50% { box-shadow: 0 0 20px rgba(102, 126, 234, 0.8); }
        }

        /* 拖拽轨迹 */
        .drag-trail {
            position: fixed;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 229, 180, 0.7), transparent);
            pointer-events: none;
            animation: trailFade 0.8s ease-out forwards;
            z-index: 999;
        }

        @keyframes trailFade {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.2); opacity: 0; }
        }

        /* 震动效果 */
        .shake {
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px) rotate(-2deg); }
            75% { transform: translateX(10px) rotate(2deg); }
        }

        /* 脉冲效果 */
        .pulse {
            animation: pulse 0.6s ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .main-container {
                padding: 2rem;
            }

            .title {
                font-size: 2.8rem;
            }

            .subtitle {
                font-size: 1.6rem;
            }

            .worker-face {
                width: 20rem;
                height: 20rem;
            }

            .action-button {
                padding: 1.5rem 3rem;
                font-size: 1.8rem;
            }

            .boss {
                width: 12rem;
                height: 12rem;
            }

            .status-bar, .time-bar {
                font-size: 1.4rem;
                padding: 1rem 1.5rem;
            }
        }

        /* 提示框 */
        .tooltip {
            position: fixed;
            background: rgba(44, 62, 80, 0.95);
            color: white;
            padding: 1rem 2rem;
            border-radius: 1rem;
            font-size: 1.6rem;
            pointer-events: none;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .tooltip.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- 背景波浪 -->
    <div class="wave-container">
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <!-- 提示框 -->
    <div class="tooltip" id="tooltip"></div>

    <!-- 主界面 -->
    <div class="main-container" id="mainContainer">
        <!-- 状态显示 -->
        <div class="status-bar">
            摸鱼成功: <span id="moyuCount">0</span> 次 🐟
        </div>

        <div class="time-bar">
            工作进度: <span id="workProgress">0</span>%
        </div>

        <!-- 标题 -->
        <h1 class="title">今天你摸鱼了吗? 🐟</h1>
        <p class="subtitle" id="subtitle">老板随时可能出现,小心点...</p>

        <!-- 进度条 -->
        <div class="progress-bar-container">
            <div class="progress-bar" id="progressBar" style="width: 0%"></div>
        </div>

        <!-- 打工人表情 -->
        <div class="worker-face" id="workerFace">
            <div class="eye eye-left">
                <div class="pupil" id="pupilLeft"></div>
            </div>
            <div class="eye eye-right">
                <div class="pupil" id="pupilRight"></div>
            </div>
            <div class="mouth"></div>
            <div class="sweat" id="sweat"></div>
        </div>

        <!-- 按钮 -->
        <div class="button-container">
            <button class="action-button moyu-button" id="moyuBtn">
                🐟 摸鱼一下
            </button>
            <button class="action-button work-button" id="workBtn">
                💼 认真工作
            </button>
        </div>

        <!-- 成功摸鱼界面 -->
        <div class="success-screen hidden" id="successScreen">
            <h2 class="result-title" style="color: #FF6B6B;">🎉 摸鱼大师! 🎉</h2>
            <p class="result-subtitle">你成功摸了 <span id="finalMoyuCount">0</span> 次鱼!</p>
            <p class="result-subtitle">恭喜下班,明天继续!</p>
            <button class="result-button" id="restartBtn1">🔄 重新开始</button>
        </div>

        <!-- 被抓到界面 -->
        <div class="caught-screen hidden" id="caughtScreen">
            <h2 class="result-title" style="color: #E74C3C;">😱 被老板抓到了! 😱</h2>
            <p class="result-subtitle">老板: "来我办公室一趟!"</p>
            <p class="result-subtitle">你摸了 <span id="caughtMoyuCount">0</span> 次鱼就被抓了...</p>
            <button class="result-button" id="restartBtn2">💔 重新做人</button>
        </div>

        <!-- 成功下班界面 -->
        <div class="offwork-screen hidden" id="offworkScreen">
            <h2 class="result-title" style="color: #4ECDC4;">🎊 恭喜下班! 🎊</h2>
            <p class="result-subtitle">工作进度达到100%!</p>
            <p class="result-subtitle">你是个好员工!(但摸了 <span id="offworkMoyuCount">0</span> 次鱼)</p>
            <button class="result-button" id="restartBtn3">🏠 下班回家</button>
        </div>
    </div>

    <!-- 老板 -->
    <div class="boss hidden" id="boss">
        <div class="boss-eye boss-eye-left"></div>
        <div class="boss-eye boss-eye-right"></div>
        <div class="boss-mouth"></div>
    </div>

    <!-- 老板警告 -->
    <div class="boss-warning hidden" id="bossWarning">
        老板来了! 😱
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 元素选择
            const workerFace = document.getElementById('workerFace');
            const moyuBtn = document.getElementById('moyuBtn');
            const workBtn = document.getElementById('workBtn');
            const boss = document.getElementById('boss');
            const bossWarning = document.getElementById('bossWarning');
            const moyuCountSpan = document.getElementById('moyuCount');
            const workProgressSpan = document.getElementById('workProgress');
            const progressBar = document.getElementById('progressBar');
            const subtitle = document.getElementById('subtitle');
            const mainContainer = document.getElementById('mainContainer');
            const successScreen = document.getElementById('successScreen');
            const caughtScreen = document.getElementById('caughtScreen');
            const offworkScreen = document.getElementById('offworkScreen');
            const tooltip = document.getElementById('tooltip');
            const sweat = document.getElementById('sweat');
            const pupilLeft = document.getElementById('pupilLeft');
            const pupilRight = document.getElementById('pupilRight');

            // 游戏状态
            let moyuCount = 0;
            let workProgress = 0;
            let bossAppearChance = 0.1; // 老板出现概率
            let gameOver = false;
            let isDragging = false;
            let dragOffsetX = 0;
            let dragOffsetY = 0;
            let trailCounter = 0;

            // 摸鱼道具库
            const moyuItems = ['🐟', '☕', '📱', '🎮', '🍕', '🎵', '😴', '🏀', '🎬', '📺'];

            // 初始化
            function init() {
                moyuCount = 0;
                workProgress = 0;
                bossAppearChance = 0.1;
                gameOver = false;
                updateDisplay();
                hideAllScreens();
                mainContainer.style.display = 'flex';
            }

            function updateDisplay() {
                moyuCountSpan.textContent = moyuCount;
                workProgressSpan.textContent = workProgress;
                progressBar.style.width = workProgress + '%';
                
                // 根据进度更新表情
                updateWorkerMood();
            }

            function updateWorkerMood() {
                const happiness = 0.5 + (moyuCount * 0.1) - (workProgress * 0.003);
                workerFace.style.setProperty('--happiness', Math.max(0, Math.min(1, happiness)));
                
                // 如果工作进度高,显示疲惫
                if (workProgress > 60) {
                    sweat.style.opacity = '1';
                } else {
                    sweat.style.opacity = '0';
                }
            }

            function hideAllScreens() {
                successScreen.classList.add('hidden');
                caughtScreen.classList.add('hidden');
                offworkScreen.classList.add('hidden');
            }

            // 摸鱼按钮点击
            moyuBtn.addEventListener('click', () => {
                if (gameOver) return;

                moyuCount++;
                workProgress = Math.max(0, workProgress - 5); // 摸鱼会降低工作进度
                bossAppearChance += 0.08; // 增加老板出现概率
                
                updateDisplay();
                createFloatingItems(5);
                moyuBtn.classList.add('pulse');
                setTimeout(() => moyuBtn.classList.remove('pulse'), 600);

                // 随机老板出现
                if (Math.random() < bossAppearChance) {
                    bossAppears();
                }

                // 摸鱼10次,成功下班
                if (moyuCount >= 10 && workProgress < 50) {
                    gameWin();
                }

                updateSubtitle();
            });

            // 工作按钮点击
            workBtn.addEventListener('click', () => {
                if (gameOver) return;

                workProgress += 15;
                bossAppearChance = Math.max(0.05, bossAppearChance - 0.03); // 降低老板出现概率
                
                updateDisplay();
                workBtn.classList.add('pulse');
                setTimeout(() => workBtn.classList.remove('pulse'), 600);

                // 按钮逃跑效果
                if (moyuCount > 3 && Math.random() < 0.3) {
                    makeButtonEscape();
                }

                // 工作进度达到100%,成功下班
                if (workProgress >= 100) {
                    workComplete();
                }

                updateSubtitle();
            });

            function updateSubtitle() {
                const messages = [
                    "摸鱼一时爽,一直摸一直爽...",
                    "小心老板突然袭击!",
                    "工作使我快乐(才怪)",
                    "今天也是打工人的一天",
                    "老板:你在干嘛?",
                    "摸鱼达人的自我修养",
                    "工作?不存在的!",
                    "划水冠军就是你!"
                ];
                subtitle.textContent = messages[Math.floor(Math.random() * messages.length)];
            }

            // 老板出现
            function bossAppears() {
                if (boss.classList.contains('hidden') === false) return;

                boss.classList.remove('hidden');
                bossWarning.classList.remove('hidden');
                
                // 随机位置出现
                const positions = [
                    { top: '10%', left: '10%' },
                    { top: '10%', right: '10%' },
                    { bottom: '10%', left: '10%' },
                    { bottom: '10%', right: '10%' },
                ];
                const pos = positions[Math.floor(Math.random() * positions.length)];
                Object.assign(boss.style, pos);

                createLightning();
                mainContainer.classList.add('shake');
                setTimeout(() => mainContainer.classList.remove('shake'), 500);

                // 3秒后检查是否被抓
                setTimeout(() => {
                    const bossRect = boss.getBoundingClientRect();
                    const workerRect = workerFace.getBoundingClientRect();
                    
                    const distance = Math.sqrt(
                        Math.pow(bossRect.left - workerRect.left, 2) +
                        Math.pow(bossRect.top - workerRect.top, 2)
                    );

                    if (distance < 250) {
                        getCaught();
                    } else {
                        boss.classList.add('hidden');
                        bossWarning.classList.add('hidden');
                        showTooltip(workerFace, '成功躲过老板! 😎');
                        setTimeout(hideTooltip, 2000);
                    }
                }, 3000);
            }

            // 被抓到
            function getCaught() {
                gameOver = true;
                boss.classList.add('hidden');
                bossWarning.classList.add('hidden');
                mainContainer.style.display = 'none';
                caughtScreen.classList.remove('hidden');
                document.getElementById('caughtMoyuCount').textContent = moyuCount;
                createLightning();
                createLightning();
            }

            // 摸鱼成功
            function gameWin() {
                gameOver = true;
                mainContainer.style.display = 'none';
                successScreen.classList.remove('hidden');
                document.getElementById('finalMoyuCount').textContent = moyuCount;
                createConfetti(100);
            }

            // 工作完成
            function workComplete() {
                gameOver = true;
                mainContainer.style.display = 'none';
                offworkScreen.classList.remove('hidden');
                document.getElementById('offworkMoyuCount').textContent = moyuCount;
                createConfetti(80);
            }

            // 按钮逃跑
            function makeButtonEscape() {
                const container = mainContainer.getBoundingClientRect();
                const btnRect = workBtn.getBoundingClientRect();
                
                workBtn.style.position = 'absolute';
                const newX = Math.random() * (container.width - btnRect.width - 40) + 20;
                const newY = Math.random() * (container.height - btnRect.height - 40) + 20;
                
                workBtn.style.left = newX + 'px';
                workBtn.style.top = newY + 'px';
                workBtn.classList.add('escaping');
                
                setTimeout(() => {
                    workBtn.classList.remove('escaping');
                    workBtn.style.position = 'relative';
                    workBtn.style.left = '0';
                    workBtn.style.top = '0';
                }, 1000);
            }

            // 创建漂浮道具
            function createFloatingItems(count) {
                for (let i = 0; i < count; i++) {
                    setTimeout(() => {
                        const item = document.createElement('div');
                        item.className = 'floating-item';
                        item.textContent = moyuItems[Math.floor(Math.random() * moyuItems.length)];
                        item.style.left = (Math.random() * 80 + 10) + '%';
                        item.style.top = (Math.random() * 30 + 35) + '%';
                        document.body.appendChild(item);
                        setTimeout(() => item.remove(), 4000);
                    }, i * 100);
                }
            }

            // 创建彩纸
            function createConfetti(count) {
                const colors = ['#667eea', '#764ba2', '#f093fb', '#FF6B6B', '#4ECDC4'];
                for (let i = 0; i < count; i++) {
                    setTimeout(() => {
                        const confetti = document.createElement('div');
                        confetti.className = 'confetti';
                        confetti.style.left = Math.random() * 100 + 'vw';
                        confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                        document.body.appendChild(confetti);
                        setTimeout(() => confetti.remove(), 4000);
                    }, i * 20);
                }
            }

            // 创建雷电
            function createLightning() {
                const lightning = document.createElement('div');
                lightning.className = 'lightning';
                lightning.style.left = Math.random() * 100 + 'vw';
                document.body.appendChild(lightning);
                setTimeout(() => lightning.remove(), 200);
            }

            // 拖拽功能
            workerFace.addEventListener('mousedown', startDrag);
            document.addEventListener('mousemove', drag);
            document.addEventListener('mouseup', stopDrag);

            function startDrag(e) {
                if (gameOver) return;
                e.preventDefault();
                
                const rect = workerFace.getBoundingClientRect();
                dragOffsetX = e.clientX - rect.left - rect.width / 2;
                dragOffsetY = e.clientY - rect.top - rect.height / 2;
                
                isDragging = true;
                workerFace.classList.add('dragging');
                workerFace.style.animation = 'none';
            }

            function drag(e) {
                if (!isDragging || gameOver) return;
                e.preventDefault();
                
                workerFace.style.position = 'fixed';
                workerFace.style.left = (e.clientX - dragOffsetX) + 'px';
                workerFace.style.top = (e.clientY - dragOffsetY) + 'px';
                
                // 创建拖拽轨迹
                trailCounter++;
                if (trailCounter % 3 === 0) {
                    createDragTrail(e.clientX, e.clientY);
                }
            }

            function stopDrag() {
                if (!isDragging) return;
                isDragging = false;
                workerFace.classList.remove('dragging');
                
                setTimeout(() => {
                    workerFace.style.position = 'relative';
                    workerFace.style.left = '0';
                    workerFace.style.top = '0';
                    workerFace.style.animation = 'workerFloat 3s ease-in-out infinite';
                }, 100);
            }

            function createDragTrail(x, y) {
                const trail = document.createElement('div');
                trail.className = 'drag-trail';
                trail.style.left = x + 'px';
                trail.style.top = y + 'px';
                document.body.appendChild(trail);
                setTimeout(() => trail.remove(), 800);
            }

            // 眼睛跟随鼠标
            mainContainer.addEventListener('mousemove', (e) => {
                if (isDragging || gameOver) return;
                
                const rect = workerFace.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                
                const angle = Math.atan2(e.clientY - centerY, e.clientX - centerX);
                const distance = Math.min(30, Math.sqrt(
                    Math.pow(e.clientX - centerX, 2) + 
                    Math.pow(e.clientY - centerY, 2)
                ) / 10);
                
                const moveX = Math.cos(angle) * distance;
                const moveY = Math.sin(angle) * distance;
                
                pupilLeft.style.transform = `translate(${moveX}%, ${moveY}%)`;
                pupilRight.style.transform = `translate(${moveX}%, ${moveY}%)`;
            });

            // 提示框
            function showTooltip(element, text) {
                const rect = element.getBoundingClientRect();
                tooltip.textContent = text;
                tooltip.style.left = (rect.left + rect.width / 2) + 'px';
                tooltip.style.top = (rect.top - 50) + 'px';
                tooltip.style.transform = 'translateX(-50%)';
                tooltip.classList.add('show');
            }

            function hideTooltip() {
                tooltip.classList.remove('show');
            }

            // 鼠标悬停提示
            moyuBtn.addEventListener('mouseenter', () => {
                showTooltip(moyuBtn, '快乐摸鱼,开心每一天!');
            });
            moyuBtn.addEventListener('mouseleave', hideTooltip);

            workBtn.addEventListener('mouseenter', () => {
                showTooltip(workBtn, '工作使我...算了不想说谎');
            });
            workBtn.addEventListener('mouseleave', hideTooltip);

            workerFace.addEventListener('mouseenter', () => {
                if (!isDragging) showTooltip(workerFace, '拖动我躲避老板!');
            });
            workerFace.addEventListener('mouseleave', hideTooltip);

            boss.addEventListener('click', () => {
                boss.classList.add('shake');
                showTooltip(boss, '看什么看!还不去干活!');
                setTimeout(() => {
                    boss.classList.remove('shake');
                    hideTooltip();
                }, 1000);
            });

            // 重新开始按钮
            document.getElementById('restartBtn1').addEventListener('click', init);
            document.getElementById('restartBtn2').addEventListener('click', init);
            document.getElementById('restartBtn3').addEventListener('click', init);

            // 初始化游戏
            init();
            
            // 定时更新字幕
            setInterval(updateSubtitle, 5000);
        });
    </script>
</body>
</html>
