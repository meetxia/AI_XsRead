<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>双十一剁手大作战 💰</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One:wght@400&family=Nunito:wght@300;400;600;700;800&display=swap');
        
        * {
            box-sizing: border-box;
            font: inherit;
        }

        html {
            color: #333;
            font-size: 62.5%;
        }

        @media screen and (max-width: 480px) {
            html {
                font-size: 50%;
            }
        }

        body {
            font-size: 2rem;
            padding: 0;
            margin: 0;
            width: 100vw;
            height: 100vh;
            font-family: 'Nunito', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 25%, #FFA500 50%, #FFD700 75%, #FF6B6B 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* 动画背景粒子 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            background: rgba(255, 215, 0, 0.3);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.5; }
            50% { transform: translateY(-30px) rotate(180deg); opacity: 1; }
        }

        /* 金币雨效果 */
        .coin-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        .coin {
            position: absolute;
            font-size: 3rem;
            animation: coinFall 3s linear forwards;
        }

        @keyframes coinFall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0.5; }
        }

        /* 购物袋飘落 */
        .shopping-bag {
            position: absolute;
            font-size: 4rem;
            animation: bagFloat 4s ease-in-out infinite;
        }

        @keyframes bagFloat {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        /* 主容器 */
        .confirm,
        .shopping-mode,
        .rational-mode {
            position: absolute;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100rem;
            max-width: 95%;
            min-width: 34rem;
            max-height: 95%;
            height: 66rem;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 3rem;
            box-shadow: 0 20px 80px rgba(255, 107, 107, 0.4), 0 0 100px rgba(255, 215, 0, 0.3);
            border: 4px solid rgba(255, 215, 0, 0.6);
            animation: slideIn 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideIn {
            from { transform: translate(-50%, -50%) scale(0.8) rotateY(10deg); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1) rotateY(0deg); opacity: 1; }
        }

        .confirm-body,
        .shopping-body,
        .rational-body {
            flex: 1;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            position: relative;
            margin: 10rem 4rem 2rem 4rem;
        }

        .confirm-body-title,
        .shopping-body-title,
        .rational-body-title {
            margin: 0;
            padding: 0;
            position: absolute;
            transform: translateY(-50%);
            top: 8%;
            text-align: center;
            width: 100%;
            font-family: 'Fredoka One', cursive;
            font-size: 3.6rem;
            background: linear-gradient(135deg, #FF6B6B, #FF8E53, #FFD700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 3px 3px 6px rgba(255, 107, 107, 0.3);
            animation: titleGlow 3s ease-in-out infinite;
        }

        @keyframes titleGlow {
            0%, 100% { filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.5)); }
            50% { filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.8)); }
        }

        .confirm-body-subtitle,
        .shopping-body-subtitle,
        .rational-body-subtitle {
            margin: 0;
            padding: 0;
            position: absolute;
            transform: translateY(-50%);
            top: 18%;
            text-align: center;
            width: 100%;
            font-size: 2.2rem;
            color: #FF6B6B;
            font-weight: 700;
            animation: subtitleFloat 4s ease-in-out infinite;
        }

        @keyframes subtitleFloat {
            0%, 100% { transform: translateY(-50%); }
            50% { transform: translateY(-55%); }
        }

        /* 按钮样式 */
        .confirm-body-button {
            color: #fff;
            border-radius: 2.5rem;
            text-decoration: none;
            padding: 2rem 4rem;
            margin-bottom: 2rem;
            min-width: 15rem;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: 800;
            font-size: 2.2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
            border: none;
            cursor: pointer;
            transform: translateY(0);
        }

        .confirm-body-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: left 0.6s;
        }

        .confirm-body-button:hover::before {
            left: 100%;
        }

        /* 买买买按钮 - 超级诱人 */
        .confirm-body-button-shop {
            background: linear-gradient(135deg, #FF6B6B, #FF8E53, #FFA500);
            animation: shopPulse 2s ease-in-out infinite;
            font-size: 2.4rem;
        }

        .confirm-body-button-shop:hover {
            background: linear-gradient(135deg, #FF8E53, #FFA500, #FFD700);
            transform: scale(1.15) rotate(-3deg);
            box-shadow: 0 15px 50px rgba(255, 107, 107, 0.6);
        }

        @keyframes shopPulse {
            0%, 100% { 
                box-shadow: 0 10px 30px rgba(255, 107, 107, 0.5);
                transform: scale(1);
            }
            50% { 
                box-shadow: 0 15px 50px rgba(255, 215, 0, 0.8);
                transform: scale(1.08);
            }
        }

        /* 理性消费按钮 */
        .confirm-body-button-rational {
            background: linear-gradient(135deg, #95E1D3, #7FB3D5, #6C8EA4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .confirm-body-button-rational:hover {
            background: linear-gradient(135deg, #A8E6CF, #95E1D3, #7FB3D5);
            transform: scale(1.1) rotate(2deg);
            box-shadow: 0 15px 40px rgba(127, 179, 213, 0.4);
        }

        /* 返回按钮 */
        .shopping-body-button,
        .rational-body-button {
            background: linear-gradient(135deg, #FFD700, #FFA500, #FF8E53);
            color: #fff;
            border-radius: 2.5rem;
            padding: 2rem 4rem;
            margin-bottom: 2rem;
            font-weight: 800;
            font-size: 2rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 165, 0, 0.4);
            transition: all 0.3s ease;
        }

        .shopping-body-button:hover,
        .rational-body-button:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.6);
        }

        /* 表情角色 */
        .boi {
            --happiness: 0.5;
            --derp: 1;
            --px: 0.5;
            --py: 0.5;
            width: 26rem;
            max-width: 100%;
            height: 26rem;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #FFE4B5, #FFD700, #FFA500);
            border-radius: 100%;
            overflow: hidden;
            margin: 0;
            align-self: center;
            flex: 0 0 auto;
            border: solid 6px #FF8E53;
            box-shadow: 0 20px 50px rgba(255, 140, 83, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: boiFloat 4s ease-in-out infinite;
            will-change: transform;
            cursor: grab;
            user-select: none;
        }

        @keyframes boiFloat {
            0%, 100% { transform: translate(-50%, -50%) translateY(0px) rotate(0deg); }
            50% { transform: translate(-50%, -50%) translateY(-15px) rotate(2deg); }
        }

        .boi:hover {
            transform: translate(-50%, -50%) scale(1.2);
            box-shadow: 0 25px 60px rgba(255, 140, 83, 0.6);
        }

        .boi,
        .boi * {
            position: absolute;
        }

        /* 心情覆盖层 */
        .boi::before {
            content: '';
            display: block;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: linear-gradient(to bottom, rgba(127, 179, 213, 0.6), rgba(127, 179, 213, 0));
            opacity: calc(1 - var(--happiness));
            transition: opacity 0.3s ease;
        }
        
        .boi.dragging {
            cursor: grabbing;
            animation: none !important;
            z-index: 1000;
            box-shadow: 0 30px 70px rgba(255, 107, 107, 0.5);
            transition: none !important;
        }

        /* 腮红 */
        .boi-blush {
            width: 24%;
            height: 14%;
            background: radial-gradient(circle, rgba(255, 100, 100, 0.9), rgba(255, 100, 100, 0.4));
            border: 3px solid rgba(255, 100, 100, 0.6);
            top: calc(45% + var(--py) * 10%);
            border-radius: 100%;
            opacity: calc(var(--happiness) * var(--happiness) * 0.9 + 0.2);
            animation: blushPulse 2.5s ease-in-out infinite;
        }

        @keyframes blushPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .boi-blush-left {
            left: calc(5% + var(--px) * 2%);
        }

        .boi-blush-right {
            right: calc(7% - var(--px) * 2%);
        }

        /* 眼睛 */
        .boi-eye {
            width: calc(30% - var(--happiness) * 2%);
            height: calc(30% - var(--happiness) * 2%);
            background: radial-gradient(circle, #ffffff, #f8f9fa);
            border-radius: 100%;
            top: calc(20% + var(--py) * 10%);
            overflow: hidden;
            border: 3px solid #333;
            box-shadow: inset 0 3px 6px rgba(0, 0, 0, 0.1);
            animation: eyeBlink 6s ease-in-out infinite;
            will-change: transform;
            transition: all 0.2s ease-out;
        }

        @keyframes eyeBlink {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0.1); }
        }

        .boi-eye-left {
            left: calc(16% + var(--px) * 4%);
        }

        .boi-eye-left::after {
            transform: translate(calc((var(--px) + var(--derp) * 0.5) * 100%), calc((var(--py) + var(--derp) * 0.5) * 100%));
        }

        .boi-eye-right {
            right: calc(20% - var(--px) * 4%);
        }

        .boi-eye-right::after {
            transform: translate(calc((var(--px) + var(--derp) * -0.3) * 100%), calc((var(--py) + var(--derp) * -0.3) * 100%));
        }

        /* 眼珠 */
        .boi-eye::after {
            content: '';
            display: block;
            background: radial-gradient(circle, #2d3436, #636e72);
            width: calc(60% - var(--happiness) * 10%);
            height: calc(60% - var(--happiness) * 10%);
            border-radius: 100%;
            transition: all 0.4s ease;
        }

        /* 眼睛高光 */
        .boi-eye::before {
            content: '';
            display: block;
            background: rgba(255, 255, 255, 0.9);
            width: 35%;
            height: 35%;
            border-radius: 100%;
            top: 20%;
            left: 20%;
            z-index: 1;
            animation: eyeShine 3s ease-in-out infinite;
        }

        @keyframes eyeShine {
            0%, 100% { opacity: 0.9; }
            50% { opacity: 1; }
        }

        /* 嘴巴 */
        .boi-mouth {
            width: calc(55% - var(--happiness) * 2%);
            height: calc(30% - var(--happiness) * 2%);
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            border-radius: calc((1 - var(--happiness)) * 10em) calc((1 - var(--happiness)) * 10em) calc(var(--happiness) * 20em) calc(var(--happiness) * 20em);
            top: calc(55% + var(--py) * 5%);
            left: calc(47.5% + var(--px) * 5%);
            transform: translateX(-50%);
            overflow: hidden;
            border: 4px solid #E85555;
            box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform, border-radius;
        }

        /* 牙齿 */
        .boi-mouth::before {
            content: '';
            display: block;
            position: absolute;
            width: 30%;
            height: 30%;
            top: 0;
            left: 50%;
            background: linear-gradient(135deg, #ffffff, #f8f9fa);
            border-radius: 0 0 1rem 1rem;
            transform: translateX(-50%);
        }

        /* 舌头 */
        .boi-mouth::after {
            content: '';
            display: block;
            position: absolute;
            width: 70%;
            height: 60%;
            left: 15%;
            bottom: 0;
            background: rgba(255, 100, 100, 0.4);
            border-radius: 25rem 25rem 0 0;
        }

        .hidden {
            display: none !important;
        }

        /* 震动动画 */
        .mega-shake {
            animation: megaShake 0.8s ease-in-out;
        }

        @keyframes megaShake {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            10% { transform: translateX(-15px) rotate(-5deg); }
            20% { transform: translateX(15px) rotate(5deg); }
            30% { transform: translateX(-12px) rotate(-3deg); }
            40% { transform: translateX(12px) rotate(3deg); }
            50% { transform: translateX(-8px) rotate(-2deg); }
            60% { transform: translateX(8px) rotate(2deg); }
            70% { transform: translateX(-5px) rotate(-1deg); }
            80% { transform: translateX(5px) rotate(1deg); }
            90% { transform: translateX(-2px) rotate(0deg); }
        }

        /* 脉冲动画 */
        .mega-pulse {
            animation: megaPulse 0.8s ease-in-out;
        }

        @keyframes megaPulse {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.3); }
            50% { transform: scale(1.1); }
            75% { transform: scale(1.2); }
        }

        /* 犹豫计数器 */
        .hesitation-counter {
            position: absolute;
            top: 5%;
            left: 5%;
            background: rgba(255, 215, 0, 0.9);
            padding: 1.5rem 2.5rem;
            border-radius: 1.5rem;
            font-weight: 800;
            color: #FF6B6B;
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            border: 3px solid rgba(255, 107, 107, 0.5);
            font-size: 1.8rem;
        }

        .hesitation-counter:hover {
            transform: scale(1.05) rotate(-2deg);
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
        }

        /* 购物车图标 */
        .cart-icon {
            position: absolute;
            top: 5%;
            right: 5%;
            font-size: 4rem;
            animation: cartBounce 2s ease-in-out infinite;
        }

        @keyframes cartBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* 工具提示 */
        .tooltip {
            position: absolute;
            background: rgba(44, 62, 80, 0.95);
            color: white;
            padding: 1rem 2rem;
            border-radius: 1rem;
            font-size: 1.6rem;
            pointer-events: none;
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .tooltip.show {
            opacity: 1;
            transform: scale(1.1);
        }

        /* 拖拽轨迹 */
        .drag-trail {
            position: fixed;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.8), rgba(255, 140, 83, 0.4), transparent);
            pointer-events: none;
            animation: trailFade 0.6s ease-out forwards;
            z-index: 999;
            will-change: transform, opacity;
        }
        
        @keyframes trailFade {
            0% { transform: scale(1) translate(-50%, -50%); opacity: 1; }
            100% { transform: scale(0.2) translate(-50%, -50%); opacity: 0; }
        }

        /* 成功粒子 */
        .success-particle {
            position: fixed;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            pointer-events: none;
            animation: successParticle 2s ease-out forwards;
            --tx: 0px;
            --ty: 0px;
        }

        @keyframes successParticle {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        /* 爆炸效果 */
        .explosion {
            position: fixed;
            width: 10px;
            height: 10px;
            background: radial-gradient(circle, #FFD700, #FFA500);
            border-radius: 50%;
            animation: explosion 1s ease-out forwards;
            z-index: 1000;
        }

        @keyframes explosion {
            0% { transform: scale(0); opacity: 1; }
            50% { transform: scale(25); opacity: 0.8; }
            100% { transform: scale(50); opacity: 0; }
        }

        /* 磁性效果 */
        .magnetic {
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .confirm, .shopping-mode, .rational-mode {
                width: 95%;
                height: 85%;
            }
            
            .boi {
                width: 20rem;
                height: 20rem;
            }
            
            .confirm-body-title,
            .shopping-body-title,
            .rational-body-title {
                font-size: 2.8rem;
            }
            
            .confirm-body-button {
                padding: 1.5rem 3rem;
                font-size: 1.8rem;
            }
        }

        /* 金钱符号漂浮 */
        .money-float {
            position: fixed;
            font-size: 3rem;
            pointer-events: none;
            animation: moneyFloat 3s ease-out forwards;
            z-index: 1000;
        }

        @keyframes moneyFloat {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-200px) scale(0.5); opacity: 0; }
        }
    </style>
</head>
<body>
    <!-- 背景粒子 -->
    <div class="particles" id="particles"></div>
    <div class="coin-rain" id="coinRain"></div>
    
    <!-- 工具提示 -->
    <div class="tooltip" id="tooltip"></div>

    <!-- 初始界面 -->
    <section class="confirm">
        <div class="hesitation-counter" id="hesitationCounter">
            犹豫次数: <span id="hesitateCount">0</span> 次 😰
        </div>
        <div class="cart-icon">🛒</div>
        <div class="confirm-body">
            <h2 class="confirm-body-title">双十一剁手大作战！💰</h2>
            <h3 class="confirm-body-subtitle">购物车已满，钱包会哭泣的那种... 要不要剁手？</h3>
            <figure class="boi magnetic" id="boi" style="--happiness:0.5; --derp:1; --px:0.5; --py:0.5;">
                <div class="boi-blush boi-blush-left"></div>
                <div class="boi-blush boi-blush-right"></div>
                <div class="boi-eye boi-eye-left"></div>
                <div class="boi-eye boi-eye-right"></div>
                <div class="boi-mouth"></div>
            </figure>
            <button class="confirm-body-button confirm-body-button-shop magnetic" id="shopBtn">
                🛒 买买买！
            </button>
            <button class="confirm-body-button confirm-body-button-rational magnetic" id="rationalBtn">
                ✋ 理性消费
            </button>
        </div>
    </section>

    <!-- 买买买后的界面 -->
    <section class="shopping-mode hidden" id="shoppingSection">
        <div class="shopping-body">
            <h2 class="shopping-body-title">🎉 购物狂欢开始！🎉</h2>
            <h3 class="shopping-body-subtitle">尾款人的胜利！钱包：我裂开了... 💸💸💸</h3>
            <figure class="boi magnetic" style="--happiness:1; --derp:0; --px:0.5; --py:0.5;">
                <div class="boi-blush boi-blush-left"></div>
                <div class="boi-blush boi-blush-right"></div>
                <div class="boi-eye boi-eye-left"></div>
                <div class="boi-eye boi-eye-right"></div>
                <div class="boi-mouth"></div>
            </figure>
            <button class="shopping-body-button magnetic" id="returnFromShopping">
                🔄 再看看
            </button>
        </div>
    </section>

    <!-- 理性消费后的界面 -->
    <section class="rational-mode hidden" id="rationalSection">
        <div class="rational-body">
            <h2 class="rational-body-title">😭 真的不买吗？</h2>
            <h3 class="rational-body-subtitle">理性？不存在的！错过就是一年... 💔</h3>
            <figure class="boi magnetic" style="--happiness:0.1; --derp:0; --px:0.5; --py:0.5;">
                <div class="boi-blush boi-blush-left"></div>
                <div class="boi-blush boi-blush-right"></div>
                <div class="boi-eye boi-eye-left"></div>
                <div class="boi-eye boi-eye-right"></div>
                <div class="boi-mouth"></div>
            </figure>
            <button class="rational-body-button magnetic" id="returnFromRational">
                💸 再考虑考虑
            </button>
        </div>
    </section>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 元素选择
            const confirmSection = document.querySelector('.confirm');
            const shoppingSection = document.getElementById('shoppingSection');
            const rationalSection = document.getElementById('rationalSection');

                for (let prop in target) {
                    if (Math.abs(target[prop] - current[prop]) < 0.001) {
