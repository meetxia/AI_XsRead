<!DOCTYPE html>
<html lang="zh-CN" class="theme-cream">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FAF6F1" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1A1714" media="(prefers-color-scheme: dark)" />
  <title>发现 · 文字之境</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../shared/tailwind-cream.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../shared/common.css" />
  <script src="../shared/theme-toggle.js"></script>
  <script src="../shared/partials.js"></script>
</head>
<body class="bg-cream-50 dark:bg-night-900 text-ink-900 dark:text-cream-100 font-sans antialiased min-h-screen paper-texture">

  <div id="header"></div>

  <main class="max-w-screen-md mx-auto px-5 pb-24">

    <section class="pt-6">
      <p class="text-xs uppercase tracking-[0.2em] text-clay-500 dark:text-clay-400 font-medium mb-1.5">Discover</p>
      <h1 class="font-serif text-3xl font-semibold tracking-tight">发现新故事</h1>
      <p class="mt-2 text-sm text-ink-700 dark:text-ink-300">每周精选，编辑亲挑。</p>
    </section>

    <!-- Tabs -->
    <section class="mt-6">
      <div class="flex gap-2 overflow-x-auto no-scrollbar -mx-5 px-5 pb-1">
        <button data-tab="recommend" class="tab shrink-0 px-4 h-9 rounded-full bg-clay-700 dark:bg-clay-500 text-cream-50 text-sm font-medium">为你推荐</button>
        <button data-tab="hot"       class="tab shrink-0 px-4 h-9 rounded-full bg-cream-100 dark:bg-night-800 text-sm font-medium">本周热门</button>
        <button data-tab="new"       class="tab shrink-0 px-4 h-9 rounded-full bg-cream-100 dark:bg-night-800 text-sm font-medium">新书上架</button>
        <button data-tab="finished"  class="tab shrink-0 px-4 h-9 rounded-full bg-cream-100 dark:bg-night-800 text-sm font-medium">完结好书</button>
        <button data-tab="editor"    class="tab shrink-0 px-4 h-9 rounded-full bg-cream-100 dark:bg-night-800 text-sm font-medium">编辑推荐</button>
      </div>
    </section>

    <!-- 分类入口 -->
    <section class="mt-6">
      <div class="grid grid-cols-5 gap-2">
        <a href="#" class="flex flex-col items-center gap-1.5 py-3 rounded-2xl bg-cream-100 dark:bg-night-800 hover:bg-cream-200 dark:hover:bg-night-700 transition">
          <span class="w-8 h-8 rounded-xl bg-clay-500/10 grid place-items-center text-clay-700 dark:text-clay-400" id="c1"></span>
          <span class="text-[11px]">古风</span>
        </a>
        <a href="#" class="flex flex-col items-center gap-1.5 py-3 rounded-2xl bg-cream-100 dark:bg-night-800 hover:bg-cream-200 dark:hover:bg-night-700 transition">
          <span class="w-8 h-8 rounded-xl bg-moss-500/10 grid place-items-center text-moss-600 dark:text-moss-500" id="c2"></span>
          <span class="text-[11px]">都市</span>
        </a>
        <a href="#" class="flex flex-col items-center gap-1.5 py-3 rounded-2xl bg-cream-100 dark:bg-night-800 hover:bg-cream-200 dark:hover:bg-night-700 transition">
          <span class="w-8 h-8 rounded-xl bg-clay-500/10 grid place-items-center text-clay-700 dark:text-clay-400" id="c3"></span>
          <span class="text-[11px]">悬疑</span>
        </a>
        <a href="#" class="flex flex-col items-center gap-1.5 py-3 rounded-2xl bg-cream-100 dark:bg-night-800 hover:bg-cream-200 dark:hover:bg-night-700 transition">
          <span class="w-8 h-8 rounded-xl bg-moss-500/10 grid place-items-center text-moss-600 dark:text-moss-500" id="c4"></span>
          <span class="text-[11px]">治愈</span>
        </a>
        <a href="#" class="flex flex-col items-center gap-1.5 py-3 rounded-2xl bg-cream-100 dark:bg-night-800 hover:bg-cream-200 dark:hover:bg-night-700 transition">
          <span class="w-8 h-8 rounded-xl bg-clay-500/10 grid place-items-center text-clay-700 dark:text-clay-400" id="c5"></span>
          <span class="text-[11px]">奇幻</span>
        </a>
      </div>
    </section>

    <!-- 大图专题轮播感 -->
    <section class="mt-10">
      <p class="text-xs uppercase tracking-[0.2em] text-clay-500 dark:text-clay-400 font-medium mb-3">Curated Collections</p>
      <div class="flex gap-4 overflow-x-auto no-scrollbar snap-x snap-mandatory -mx-5 px-5 pb-2">
        <a href="#" class="snap-start shrink-0 w-72 rounded-3xl overflow-hidden bg-cream-100 dark:bg-night-800 shadow-cream">
          <div class="relative aspect-[5/3]">
            <svg viewBox="0 0 400 240" class="w-full h-full" preserveAspectRatio="xMidYMid slice">
              <defs><linearGradient id="t1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6B7B5A"/><stop offset="100%" stop-color="#2A2520"/></linearGradient></defs>
              <rect width="400" height="240" fill="url(#t1)"/>
              <path d="M0,180 Q100,140 200,160 T400,165 L400,240 L0,240 Z" fill="#1A1714" opacity="0.4"/>
            </svg>
            <div class="absolute inset-0 p-5 flex flex-col justify-end text-cream-50">
              <p class="text-[10px] tracking-[0.2em] uppercase text-cream-200/70">No.07 · 治愈专题</p>
              <p class="font-serif text-xl font-semibold mt-1">在文字里，我们都是赶路人</p>
            </div>
          </div>
        </a>
        <a href="#" class="snap-start shrink-0 w-72 rounded-3xl overflow-hidden bg-cream-100 dark:bg-night-800 shadow-cream">
          <div class="relative aspect-[5/3]">
            <svg viewBox="0 0 400 240" class="w-full h-full" preserveAspectRatio="xMidYMid slice">
              <defs><linearGradient id="t2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#A87A56"/><stop offset="100%" stop-color="#5C3B25"/></linearGradient></defs>
              <rect width="400" height="240" fill="url(#t2)"/>
            </svg>
            <div class="absolute inset-0 p-5 flex flex-col justify-end text-cream-50">
              <p class="text-[10px] tracking-[0.2em] uppercase text-cream-200/70">No.06 · 古言专题</p>
              <p class="font-serif text-xl font-semibold mt-1">长安城里的故事</p>
            </div>
          </div>
        </a>
        <a href="#" class="snap-start shrink-0 w-72 rounded-3xl overflow-hidden bg-cream-100 dark:bg-night-800 shadow-cream">
          <div class="relative aspect-[5/3]">
            <svg viewBox="0 0 400 240" class="w-full h-full" preserveAspectRatio="xMidYMid slice">
              <defs><linearGradient id="t3" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#9A3429"/><stop offset="100%" stop-color="#2A2520"/></linearGradient></defs>
              <rect width="400" height="240" fill="url(#t3)"/>
            </svg>
            <div class="absolute inset-0 p-5 flex flex-col justify-end text-cream-50">
              <p class="text-[10px] tracking-[0.2em] uppercase text-cream-200/70">No.05 · 悬疑专题</p>
              <p class="font-serif text-xl font-semibold mt-1">我猜不到结局</p>
            </div>
          </div>
        </a>
      </div>
    </section>

    <!-- 列表 -->
    <section class="mt-10">
      <div class="flex items-end justify-between mb-4">
        <h2 class="font-serif text-xl font-semibold tracking-tight">为你精选</h2>
        <span class="text-xs text-ink-500 dark:text-ink-300">基于你的阅读偏好</span>
      </div>
      <div class="grid grid-cols-2 gap-4" id="bookGrid"></div>
      <button class="mt-6 w-full py-3 text-sm font-medium border border-cream-200 dark:border-night-700 rounded-2xl hover:bg-cream-100 dark:hover:bg-night-800 transition">
        换一批
      </button>
    </section>
  </main>

  <div id="bottomNav"></div>

  <script>
    document.getElementById('header').innerHTML = XS.appHeader();
    document.getElementById('bottomNav').innerHTML = XS.bottomNav('discover');

    document.getElementById('c1').innerHTML = XS.icon('starFill', 'w-4 h-4');
    document.getElementById('c2').innerHTML = XS.icon('fire', 'w-4 h-4');
    document.getElementById('c3').innerHTML = XS.icon('eye', 'w-4 h-4');
    document.getElementById('c4').innerHTML = XS.icon('sparkle', 'w-4 h-4');
    document.getElementById('c5').innerHTML = XS.icon('heart', 'w-4 h-4');

    const books = [
      { id:1, title:'山有木兮',         author:'沈砚白', cat:'古风言情', rating:9.2, variant:1 },
      { id:2, title:'归棠记事',         author:'沈砚白', cat:'古风',     rating:9.0, variant:0 },
      { id:3, title:'夜窗集',           author:'阮宁',   cat:'治愈散文', rating:8.7, variant:1 },
      { id:4, title:'流光记',           author:'温知秋', cat:'都市',     rating:8.9, variant:4 },
      { id:5, title:'迷雾镇·第七封信',  author:'江聿',   cat:'悬疑',     rating:9.4, variant:5 },
      { id:6, title:'长安的秋天',       author:'沈砚白', cat:'古风',     rating:9.3, variant:0 },
    ];
    document.getElementById('bookGrid').innerHTML = books.map(b => `
      <a href="detail.html?id=${b.id}" class="book-card">
        <div class="aspect-[3/4] rounded-2xl overflow-hidden shadow-cream">
          ${XS.cover({variant:b.variant, title:b.title.split('·')[0].slice(0,2), sub:''})}
        </div>
        <div class="mt-2.5">
          <h4 class="font-serif font-semibold text-sm leading-snug line-clamp-1">${b.title}</h4>
          <p class="text-xs text-ink-500 dark:text-ink-300 mt-0.5 line-clamp-1">${b.author} · ${b.cat}</p>
          <div class="flex items-center gap-1 mt-1 text-[11px] text-clay-500 dark:text-clay-400">
            ${XS.icon('starFill', 'w-3 h-3')}
            <span class="font-medium">${b.rating}</span>
          </div>
        </div>
      </a>`).join('');

    // Tab 切换
    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(b => {
          b.classList.remove('bg-clay-700','dark:bg-clay-500','text-cream-50');
          b.classList.add('bg-cream-100','dark:bg-night-800');
        });
        btn.classList.add('bg-clay-700','dark:bg-clay-500','text-cream-50');
        btn.classList.remove('bg-cream-100','dark:bg-night-800');
      });
    });
  </script>
</body>
</html>
