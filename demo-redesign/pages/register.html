<!DOCTYPE html>
<html lang="zh-CN" class="theme-cream">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FAF6F1" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1A1714" media="(prefers-color-scheme: dark)" />
  <title>注册 · 文字之境</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../shared/tailwind-cream.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../shared/common.css" />
  <script src="../shared/theme-toggle.js"></script>
  <script src="../shared/partials.js"></script>
</head>
<body class="bg-cream-50 dark:bg-night-900 text-ink-900 dark:text-cream-100 font-sans antialiased min-h-screen paper-texture">

  <header class="sticky top-0 z-40 pt-safe">
    <div class="max-w-screen-md mx-auto px-3 h-14 flex items-center justify-between">
      <button onclick="history.back()" class="w-10 h-10 grid place-items-center rounded-full hover:bg-cream-100 dark:hover:bg-night-800" aria-label="返回">
        <span id="backIcon"></span>
      </button>
      <button data-theme-toggle class="w-10 h-10 grid place-items-center rounded-full hover:bg-cream-100 dark:hover:bg-night-800">
        <span class="dark:hidden" id="moonIcon"></span>
        <span class="hidden dark:inline-block" id="sunIcon"></span>
      </button>
    </div>
  </header>

  <main class="max-w-md mx-auto px-6 pt-8 pb-12 min-h-[calc(100vh-3.5rem)] flex flex-col">

    <div class="mb-8">
      <p class="text-xs font-medium uppercase tracking-[0.2em] text-clay-500 dark:text-clay-400 mb-2">Welcome</p>
      <h1 class="font-serif text-3xl font-semibold tracking-tight">开始你的阅读旅程</h1>
      <p class="text-sm text-ink-700 dark:text-ink-300 mt-2">一步步创建账号，加入文字之境。</p>
    </div>

    <form class="space-y-4">
      <div>
        <label class="block text-xs font-medium text-ink-700 dark:text-ink-300 mb-2 uppercase tracking-wider">用户名</label>
        <input type="text" placeholder="为自己取个名字（2-16 字）" class="w-full h-12 px-4 rounded-xl bg-cream-100 dark:bg-night-800 border border-transparent focus:border-clay-500 focus:bg-cream-50 dark:focus:bg-night-700 outline-none text-sm transition"/>
      </div>

      <div>
        <label class="block text-xs font-medium text-ink-700 dark:text-ink-300 mb-2 uppercase tracking-wider">手机号</label>
        <div class="flex gap-2">
          <select class="h-12 px-3 rounded-xl bg-cream-100 dark:bg-night-800 border border-transparent focus:border-clay-500 outline-none text-sm">
            <option>+86</option>
            <option>+852</option>
            <option>+1</option>
          </select>
          <input type="tel" placeholder="11 位手机号" class="flex-1 h-12 px-4 rounded-xl bg-cream-100 dark:bg-night-800 border border-transparent focus:border-clay-500 focus:bg-cream-50 dark:focus:bg-night-700 outline-none text-sm transition"/>
        </div>
      </div>

      <div>
        <label class="block text-xs font-medium text-ink-700 dark:text-ink-300 mb-2 uppercase tracking-wider">验证码</label>
        <div class="flex gap-2">
          <input type="text" placeholder="6 位验证码" class="flex-1 h-12 px-4 rounded-xl bg-cream-100 dark:bg-night-800 border border-transparent focus:border-clay-500 focus:bg-cream-50 dark:focus:bg-night-700 outline-none text-sm transition"/>
          <button type="button" class="h-12 px-5 rounded-xl bg-clay-500/10 text-clay-700 dark:text-clay-400 font-medium text-sm hover:bg-clay-500/15">获取验证码</button>
        </div>
      </div>

      <div>
        <label class="block text-xs font-medium text-ink-700 dark:text-ink-300 mb-2 uppercase tracking-wider">设置密码</label>
        <input type="password" placeholder="至少 8 位，含字母与数字" class="w-full h-12 px-4 rounded-xl bg-cream-100 dark:bg-night-800 border border-transparent focus:border-clay-500 focus:bg-cream-50 dark:focus:bg-night-700 outline-none text-sm transition"/>
        <!-- 强度指示 -->
        <div class="mt-2 flex gap-1.5">
          <span class="flex-1 h-1 rounded-full bg-cinnabar-500"></span>
          <span class="flex-1 h-1 rounded-full bg-clay-500"></span>
          <span class="flex-1 h-1 rounded-full bg-cream-200 dark:bg-night-700"></span>
          <span class="flex-1 h-1 rounded-full bg-cream-200 dark:bg-night-700"></span>
        </div>
        <p class="mt-1 text-[11px] text-ink-500 dark:text-ink-300">密码强度：中等</p>
      </div>

      <!-- 偏好选择（玩点小心思） -->
      <div class="pt-2">
        <label class="block text-xs font-medium text-ink-700 dark:text-ink-300 mb-2 uppercase tracking-wider">阅读偏好（可选）</label>
        <div class="flex flex-wrap gap-2">
          <button type="button" class="pref px-3 py-1.5 rounded-full text-xs bg-cream-100 dark:bg-night-800 border border-transparent">古风言情</button>
          <button type="button" class="pref px-3 py-1.5 rounded-full text-xs bg-cream-100 dark:bg-night-800 border border-transparent">都市恋曲</button>
          <button type="button" class="pref px-3 py-1.5 rounded-full text-xs bg-cream-100 dark:bg-night-800 border border-transparent">悬疑推理</button>
          <button type="button" class="pref px-3 py-1.5 rounded-full text-xs bg-cream-100 dark:bg-night-800 border border-transparent">治愈系</button>
          <button type="button" class="pref px-3 py-1.5 rounded-full text-xs bg-cream-100 dark:bg-night-800 border border-transparent">奇幻冒险</button>
          <button type="button" class="pref px-3 py-1.5 rounded-full text-xs bg-cream-100 dark:bg-night-800 border border-transparent">校园青春</button>
        </div>
      </div>

      <!-- 协议 -->
      <label class="flex items-start gap-2 pt-2">
        <input type="checkbox" id="agree" class="peer sr-only"/>
        <span class="w-5 h-5 mt-0.5 rounded-md border-2 border-ink-300 peer-checked:bg-clay-500 peer-checked:border-clay-500 grid place-items-center text-cream-50 transition shrink-0">
          <span id="checkIcon" class="hidden"></span>
        </span>
        <span class="text-xs text-ink-700 dark:text-ink-300 leading-relaxed">
          我已阅读并同意
          <a href="#" class="text-clay-700 dark:text-clay-400 underline">用户协议</a>
          和
          <a href="#" class="text-clay-700 dark:text-clay-400 underline">隐私政策</a>
        </span>
      </label>

      <button type="submit" class="w-full h-12 rounded-xl bg-clay-700 dark:bg-clay-500 text-cream-50 font-serif font-semibold hover:bg-clay-600 active:scale-[0.98] transition shadow-cream">
        创建账号
      </button>
    </form>

    <p class="mt-auto pt-10 text-center text-sm text-ink-700 dark:text-ink-300">
      已有账号？
      <a href="login.html" class="text-clay-700 dark:text-clay-400 font-medium underline-offset-4 hover:underline">直接登录</a>
    </p>
  </main>

  <script>
    document.getElementById('backIcon').innerHTML = XS.icon('back');
    document.getElementById('moonIcon').innerHTML = XS.icon('moon');
    document.getElementById('sunIcon').innerHTML = XS.icon('sun');
    document.getElementById('checkIcon').innerHTML = XS.icon('check', 'w-3.5 h-3.5');

    // 偏好多选
    document.querySelectorAll('.pref').forEach(btn => {
      btn.addEventListener('click', () => {
        btn.classList.toggle('bg-clay-500/10');
        btn.classList.toggle('border-clay-500');
        btn.classList.toggle('text-clay-700');
        btn.classList.toggle('dark:text-clay-400');
      });
    });

    // 同意协议显示对勾
    const agree = document.getElementById('agree');
    agree.addEventListener('change', () => {
      document.getElementById('checkIcon').classList.toggle('hidden', !agree.checked);
    });
  </script>
</body>
</html>
