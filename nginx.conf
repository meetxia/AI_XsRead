# Nginx 配置 - MOMO 小说（xs.momofx.cn + admin.xs.momofx.cn）
# 部署前置条件：宝塔已经申请并配置好 SSL 证书路径
# Track: 管理端 Sprint 2 / T-5.1
#
# 关键变化（vs 旧 nginx.conf）：
#   1. 新增 80 → 443 跳转
#   2. 用户域 https + HSTS / X-Frame / Referrer-Policy / Permissions-Policy
#   3. 新增 admin.xs.momofx.cn server block（管理后台入口）
#   4. 删除全局 Access-Control-Allow-Origin: *（CORS 由后端 cors() 统一控制）
#   5. 屏蔽 /stats.html 与隐藏文件
#   6. brotli 默认注释（视 nginx 是否装 ngx_brotli 模块再开）

# ============================================
# 1. HTTP → HTTPS 跳转（用户域 + 管理域）
# ============================================
server {
    listen 80;
    server_name xs.momofx.cn admin.xs.momofx.cn;
    return 301 https://$host$request_uri;
}

# ============================================
# 2. 用户前端（HTTPS）
# ============================================
server {
    listen 443 ssl http2;
    server_name xs.momofx.cn;

    # SSL（路径以宝塔实际生成为准）
    ssl_certificate     /www/server/panel/vhost/cert/xs.momofx.cn/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/xs.momofx.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!RC4:!3DES;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    root /www/wwwroot/xs.momofx.cn/ai-xsread-vue3/dist;
    index index.html;

    access_log /www/wwwlogs/xs.momofx.cn_access.log;
    error_log  /www/wwwlogs/xs.momofx.cn_error.log;

    # ── 安全响应头 ──
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ── 压缩：gzip ──
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml+rss
        application/xml
        image/svg+xml
        font/woff2;

    # ── brotli（如 nginx 装了 ngx_brotli 模块，再放开下面 3 行）──
    # brotli on;
    # brotli_comp_level 5;
    # brotli_types text/plain text/css application/javascript application/json image/svg+xml font/woff2;

    # ── 反代用户后端 API ──
    location /api {
        proxy_pass http://127.0.0.1:8005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # CORS 由后端 cors() 控制；nginx 这层不再加 wildcard，避免双层冲突
    }

    # ── 上传文件访问（封面/头像等图片资源）──
    location ^~ /uploads/ {
        alias /www/wwwroot/xs.momofx.cn/backend/uploads/;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable" always;

        # WebP 优先：客户端支持 WebP 时浏览器会发送 Accept: image/webp
        location ~* \.(jpg|jpeg|png)$ {
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header Vary "Accept" always;
            try_files $uri $uri =404;
        }
    }

    # ── 带 hash 的 JS/CSS 长缓存 ──
    location ~* "^/(?:js|css)/.*\.[a-f0-9]{8,}\.(js|css)$" {
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # ── 静态资源缓存（图片/字体/图标）30d ──
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
    }

    # ── HTML 不缓存 ──
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # ── Vue Router History 模式 SPA fallback ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 屏蔽隐藏文件与 stats.html（避免泄漏 bundle 拓扑）──
    location ~ /\. { deny all; }
    location = /stats.html { deny all; }
}

# ============================================
# 3. 管理前端（HTTPS，子域）
# ============================================
server {
    listen 443 ssl http2;
    server_name admin.xs.momofx.cn;

    # 注意：admin 子域需要单独申请 SSL 证书
    ssl_certificate     /www/server/panel/vhost/cert/admin.xs.momofx.cn/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/admin.xs.momofx.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!RC4:!3DES;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    root /www/wwwroot/xs.momofx.cn/admin-frontend/dist;
    index index.html;

    access_log /www/wwwlogs/admin.xs.momofx.cn_access.log;
    error_log  /www/wwwlogs/admin.xs.momofx.cn_error.log;

    # ── 管理后台更严格的安全头 ──
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;            # 管理后台禁止任何 iframe 嵌入
    add_header Referrer-Policy "strict-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ── gzip ──
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    # ── 反代管理后端 ──
    location /api {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── 管理端封面/头像预览：复用用户后端 uploads 静态目录 ──
    location ^~ /uploads/ {
        alias /www/wwwroot/xs.momofx.cn/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
    }

    # ── 带 hash 的 JS/CSS 长缓存 ──
    location ~* "^/(?:js|css)/.*\.[a-f0-9]{8,}\.(js|css)$" {
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # ── 其他静态资源 30d ──
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
    }

    # ── HTML 不缓存 ──
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # ── SPA fallback ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 屏蔽隐藏文件与 stats.html ──
    location ~ /\. { deny all; }
    location = /stats.html { deny all; }
}
