# Nginx配置文件 - 用于xs.momofx.cn
# 复制此配置到宝塔面板 -> 网站 -> 配置文件中

server {
    listen 80;
    server_name xs.momofx.cn;
    
    # 网站根目录 - 指向Vue构建后的dist目录
    root /www/wwwroot/xs.momofx.cn/ai-xsread-vue3/dist;
    index index.html;
    
    # 日志文件
    access_log /www/wwwlogs/xs.momofx.cn_access.log;
    error_log /www/wwwlogs/xs.momofx.cn_error.log;
    
    # ============================================
    # Gzip 压缩（含 WebP/SVG/字体）
    # ============================================
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml+rss
        application/xml
        image/svg+xml
        font/woff2;
    
    # ============================================
    # API反向代理 - 转发到后端服务
    # ============================================
    location /api {
        proxy_pass http://127.0.0.1:8005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS配置（如果后端已配置可删除）
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS';
        add_header Access-Control-Allow-Headers 'DNT,X-Mx-ReqToken,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization';
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }
    
    # ============================================
    # 上传文件访问（封面/头像等图片资源）
    # 长期缓存 + immutable（文件名含 hash，内容不变）
    # ============================================
    location /uploads {
        alias /www/wwwroot/xs.momofx.cn/backend/uploads;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        
        # WebP 优先：如果客户端支持 WebP 且 WebP 文件存在，自动返回 WebP
        location ~* \.(jpg|jpeg|png)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Vary "Accept";
            try_files $uri $uri =404;
        }
    }
    
    # ============================================
    # 前端构建产物（带 hash 的 JS/CSS）— 长期缓存
    # ============================================
    location ~* /(?:js|css)/.*\.[a-f0-9]{8,}\.(js|css)$ {
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    
    # ============================================
    # 静态资源缓存（图片/字体/图标）
    # ============================================
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }
    
    # ============================================
    # HTML 文件 — 不缓存（确保用户拿到最新版本）
    # ============================================
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    
    # ============================================
    # Vue Router History模式配置（SPA fallback）
    # ============================================
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }
}
