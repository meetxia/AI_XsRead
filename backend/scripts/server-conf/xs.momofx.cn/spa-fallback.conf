# Vue Router history 模式 SPA 兜底
# 部署位置：/www/server/panel/vhost/nginx/extension/xs.momofx.cn/spa-fallback.conf
# 加载顺序：宝塔 vhost 通过 include extension/xs.momofx.cn/*.conf 加载，按文件名字母序
# /api/、/uploads/、/.well-known/ 已在 api-proxy.conf 用 location ^~ 抢占，不受这条 fallback 影响

location / {
    try_files $uri $uri/ /index.html;
}
