# 反向代理 /api/* 到 PM2 进程 xsread-backend (127.0.0.1:8005)
# 部署位置：/www/server/panel/vhost/nginx/extension/xs.momofx.cn/api-proxy.conf
# location ^~ 表示前缀匹配优先级高于正则 location，确保 SPA fallback 不会覆盖 /api/ 和 /uploads/

location ^~ /api/ {
    proxy_pass http://127.0.0.1:8005;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
}

# /uploads/* 直接读后端目录里的静态文件
location ^~ /uploads/ {
    alias /www/wwwroot/xs.momofx.cn/backend/uploads/;
    expires 30d;
    add_header Cache-Control "public, immutable";
}
