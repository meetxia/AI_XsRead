<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>书架 · MOMO小说</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: {
      colors: { 'cream':{50:'#FDFBF7',100:'#FAF8F5',200:'#F0E6D8',300:'#E5D5BE'}, 'ink':{700:'#3D3935',800:'#2A2622',900:'#1A1B23'}, 'coral':{400:'#F5856E',500:'#E85A4F'} },
      fontFamily: { serif: ['Noto Serif SC', 'serif'], sans: ['Inter', 'Noto Serif SC', 'sans-serif'] }
    }}}
  </script>
  <style>
    body { font-family: 'Inter', 'Noto Serif SC', sans-serif; -webkit-tap-highlight-color: transparent; background:#FAF8F5; color:#2A2622; }
    .serif { font-family: 'Noto Serif SC', serif; }
    html.dark body { background:#1A1B23; color:#F5F1EA; }
    .container-app { max-width:480px; margin:0 auto; }
    @media(min-width:768px){ .container-app{max-width:720px;} }
    .fade-up { animation: fadeUp .6s cubic-bezier(.4,0,.2,1) both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px);} to{opacity:1;transform:translateY(0);} }
    .book-cover { aspect-ratio:3/4; box-shadow: 0 8px 16px -8px rgba(0,0,0,0.2); }
    html.dark .book-cover { box-shadow: 0 8px 16px -8px rgba(0,0,0,0.6); }
  </style>
</head>
<body class="min-h-screen pb-24">

  <!-- 顶部 -->
  <header class="sticky top-0 z-40 backdrop-blur-xl bg-cream-100/80 dark:bg-ink-900/80 border-b border-cream-200/60 dark:border-ink-700/60">
    <div class="container-app px-5 h-14 flex items-center justify-between">
      <span class="serif text-lg font-bold">书架</span>
      <div class="flex items-center gap-1">
        <button class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-cream-200/50 dark:hover:bg-ink-800/50">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.2-5.2m0 0a7 7 0 10-9.9 0 7 7 0 009.9 0z"/></svg>
        </button>
        <button id="theme-toggle" class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-cream-200/50 dark:hover:bg-ink-800/50">
          <svg class="w-5 h-5 sun-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/></svg>
          <svg class="w-5 h-5 moon-icon hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="container-app px-5 pt-4">

    <!-- 阅读统计 -->
    <section class="fade-up">
      <div class="grid grid-cols-3 gap-3">
        <div class="p-4 bg-white dark:bg-ink-800 rounded-2xl">
          <div class="text-[10px] tracking-widest text-stone-500 dark:text-stone-400 mb-1">在读</div>
          <div class="serif text-2xl font-bold text-coral-500">3</div>
        </div>
        <div class="p-4 bg-white dark:bg-ink-800 rounded-2xl">
          <div class="text-[10px] tracking-widest text-stone-500 dark:text-stone-400 mb-1">收藏</div>
          <div class="serif text-2xl font-bold">12</div>
        </div>
        <div class="p-4 bg-white dark:bg-ink-800 rounded-2xl">
          <div class="text-[10px] tracking-widest text-stone-500 dark:text-stone-400 mb-1">完读</div>
          <div class="serif text-2xl font-bold">8</div>
        </div>
      </div>
    </section>

    <!-- 继续阅读 -->
    <section class="mt-6 fade-up" style="animation-delay:.1s">
      <div class="flex items-center justify-between mb-3">
        <h2 class="serif text-lg font-bold flex items-center gap-2">
          <span class="w-1 h-4 bg-coral-500 rounded-full"></span>
          继续阅读
        </h2>
        <span class="text-xs text-stone-500 dark:text-stone-400">3 本</span>
      </div>

      <a href="reading.html" class="flex gap-4 p-4 bg-gradient-to-br from-coral-500/10 to-coral-500/5 rounded-2xl border border-coral-500/20 mb-3">
        <div class="book-cover w-16 rounded-md flex-shrink-0 relative" style="background: linear-gradient(135deg,#3D3935,#1A1B23);">
          <div class="absolute inset-0 flex items-center justify-center serif text-coral-400 text-[10px] font-bold p-1 text-center">长安月下</div>
        </div>
        <div class="flex-1 min-w-0">
          <div class="serif font-semibold truncate">长安月下，归人未归</div>
          <div class="text-xs text-stone-500 dark:text-stone-400 mt-0.5">墨染流年</div>
          <div class="mt-2">
            <div class="text-[10px] text-coral-500 font-semibold mb-1">第 23 章 · 月下相逢 · 42%</div>
            <div class="h-1 bg-coral-500/20 rounded-full overflow-hidden">
              <div class="h-full bg-coral-500 rounded-full" style="width:42%"></div>
            </div>
          </div>
        </div>
      </a>

      <div class="space-y-2">
        <a href="reading.html" class="flex gap-4 p-3 bg-white dark:bg-ink-800 rounded-2xl">
          <div class="book-cover w-12 rounded-md flex-shrink-0" style="background: linear-gradient(135deg,#5B7B8D,#8FAEB8);"></div>
          <div class="flex-1 min-w-0 py-1">
            <div class="serif text-sm font-semibold truncate">雨夜迷雾中的真相</div>
            <div class="text-xs text-stone-500 dark:text-stone-400 mt-0.5">悬疑女王 · 第 11 章</div>
            <div class="text-[10px] text-stone-400 mt-1.5">已读 28%</div>
          </div>
        </a>
        <a href="reading.html" class="flex gap-4 p-3 bg-white dark:bg-ink-800 rounded-2xl">
          <div class="book-cover w-12 rounded-md flex-shrink-0" style="background: linear-gradient(135deg,#A8B89D,#C9D4B5);"></div>
          <div class="flex-1 min-w-0 py-1">
            <div class="serif text-sm font-semibold truncate">咖啡馆里的小确幸</div>
            <div class="text-xs text-stone-500 dark:text-stone-400 mt-0.5">治愈系作者 · 第 5 章</div>
            <div class="text-[10px] text-stone-400 mt-1.5">已读 13%</div>
          </div>
        </a>
      </div>
    </section>

    <!-- Tab 切换 -->
    <section class="mt-8 fade-up" style="animation-delay:.15s">
      <div class="flex items-center gap-1 border-b border-cream-200 dark:border-ink-700">
        <button class="relative px-4 py-2.5 text-sm font-semibold text-coral-500">
          全部收藏
          <span class="absolute bottom-0 left-1/2 -translate-x-1/2 w-8 h-0.5 bg-coral-500 rounded-full"></span>
        </button>
        <button class="px-4 py-2.5 text-sm text-stone-500 dark:text-stone-400">想看</button>
        <button class="px-4 py-2.5 text-sm text-stone-500 dark:text-stone-400">已完读</button>
      </div>
    </section>

    <!-- 书架网格 -->
    <section class="mt-5 fade-up" style="animation-delay:.2s">
      <div class="grid grid-cols-3 gap-4">
        <a href="detail.html" class="group">
          <div class="book-cover rounded-md mb-2 overflow-hidden relative" style="background: linear-gradient(135deg,#3D3935,#1A1B23);">
            <div class="absolute inset-2 border border-coral-400/30 rounded-sm"></div>
            <div class="absolute inset-0 flex items-center justify-center serif text-coral-400 text-xs font-bold p-2 text-center leading-tight">长安月下<br/>归人未归</div>
          </div>
          <div class="serif text-xs font-semibold leading-tight truncate">长安月下，归人未归</div>
          <div class="text-[10px] text-stone-500 dark:text-stone-400 mt-0.5 truncate">墨染流年</div>
        </a>
        <a href="detail.html" class="group">
          <div class="book-cover rounded-md mb-2 overflow-hidden relative" style="background: linear-gradient(135deg,#5B7B8D,#8FAEB8);">
            <div class="absolute inset-2 border border-white/20 rounded-sm"></div>
            <div class="absolute inset-0 flex items-center justify-center serif text-white text-xs font-bold p-2 text-center leading-tight">雨夜迷雾</div>
          </div>
          <div class="serif text-xs font-semibold leading-tight truncate">雨夜迷雾中的真相</div>
          <div class="text-[10px] text-stone-500 dark:text-stone-400 mt-0.5 truncate">悬疑女王</div>
        </a>
        <a href="detail.html" class="group">
          <div class="book-cover rounded-md mb-2 overflow-hidden relative" style="background: linear-gradient(135deg,#A8B89D,#C9D4B5);">
            <div class="absolute inset-2 border border-stone-700/20 rounded-sm"></div>
            <div class="absolute inset-0 flex items-center justify-center serif text-stone-700 text-xs font-bold p-2 text-center leading-tight">咖啡馆<br/>小确幸</div>
          </div>
          <div class="serif text-xs font-semibold leading-tight truncate">咖啡馆里的小确幸</div>
          <div class="text-[10px] text-stone-500 dark:text-stone-400 mt-0.5 truncate">治愈系作者</div>
        </a>
        <a href="detail.html" class="group">
          <div class="book-cover rounded-md mb-2 overflow-hidden relative" style="background: linear-gradient(135deg,#C9B1FF,#A78BFA);">
            <div class="absolute inset-2 border border-white/30 rounded-sm"></div>
            <div class="absolute inset-0 flex items-center justify-center serif text-white text-xs font-bold p-2 text-center leading-tight">时光相遇</div>
          </div>
          <div class="serif text-xs font-semibold leading-tight truncate">时光里的温柔相遇</div>
          <div class="text-[10px] text-stone-500 dark:text-stone-400 mt-0.5 truncate">温柔笔触</div>
        </a>
        <a href="detail.html" class="group">
          <div class="book-cover rounded-md mb-2 overflow-hidden relative" style="background: linear-gradient(135deg,#FFD3B6,#FFAAA5);">
            <div class="absolute inset-2 border border-stone-700/20 rounded-sm"></div>
            <div class="absolute inset-0 flex items-center justify-center serif text-stone-700 text-xs font-bold p-2 text-center leading-tight">桃花笺</div>
          </div>
          <div class="serif text-xs font-semibold leading-tight truncate">桃花笺</div>
          <div class="text-[10px] text-stone-500 dark:text-stone-400 mt-0.5 truncate">墨染流年</div>
        </a>
        <a href="detail.html" class="group">
          <div class="book-cover rounded-md mb-2 overflow-hidden relative" style="background: linear-gradient(135deg,#E85A4F,#F5856E);">
            <div class="absolute inset-2 border border-white/30 rounded-sm"></div>
            <div class="absolute inset-0 flex items-center justify-center serif text-white text-xs font-bold p-2 text-center leading-tight">浮生若梦</div>
          </div>
          <div class="serif text-xs font-semibold leading-tight truncate">浮生若梦</div>
          <div class="text-[10px] text-stone-500 dark:text-stone-400 mt-0.5 truncate">墨染流年</div>
        </a>
      </div>

      <button class="w-full py-4 mt-6 rounded-2xl border border-dashed border-cream-300 dark:border-ink-700 text-stone-500 dark:text-stone-400 text-sm flex items-center justify-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
        发现更多好书
      </button>
    </section>

  </main>

  <!-- 底部导航 -->
  <nav class="fixed bottom-0 left-0 right-0 z-40 backdrop-blur-xl bg-cream-100/90 dark:bg-ink-900/90 border-t border-cream-200/60 dark:border-ink-700/60" style="padding-bottom: env(safe-area-inset-bottom);">
    <div class="container-app grid grid-cols-4 h-16">
      <a href="index.html" class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400">
        <svg class="w-5 h-5 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/></svg>
        <span class="text-[10px] font-medium">发现</span>
      </a>
      <a href="bookshelf.html" class="flex flex-col items-center justify-center text-coral-500">
        <svg class="w-5 h-5 mb-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M5.5 2A2.5 2.5 0 003 4.5v15A2.5 2.5 0 005.5 22h13a2.5 2.5 0 002.5-2.5v-15A2.5 2.5 0 0018.5 2h-13zM7 5h2v6l1-1 1 1V5h7v14H7V5z"/></svg>
        <span class="text-[10px] font-medium">书架</span>
      </a>
      <a href="reading.html" class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400">
        <svg class="w-5 h-5 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 5.25h16.5m-16.5 4.5h16.5m-16.5 4.5h16.5m-16.5 4.5h16.5"/></svg>
        <span class="text-[10px] font-medium">阅读</span>
      </a>
      <a href="profile.html" class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400">
        <svg class="w-5 h-5 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.5 20.25a7.5 7.5 0 0115 0"/></svg>

      </a>

  </nav>

  <a href="../index.html" class="fixed top-3 left-3 z-50 w-9 h-9 flex items-center justify-center rounded-full bg-white/80 dark:bg-ink-800/80 backdrop-blur shadow-lg text-stone-600 dark:text-stone-300 opacity-0 pointer-events-none">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
  </a>

  <script>
    const html = document.documentElement;
    if (localStorage.getItem('demo-theme-a') === 'dark') html.classList.add('dark');
    document.querySelector('.sun-icon').classList.toggle('hidden', html.classList.contains('dark'));
    document.querySelector('.moon-icon').classList.toggle('hidden', !html.classList.contains('dark'));
    document.getElementById('theme-toggle').addEventListener('click', () => {
      html.classList.toggle('dark');
      localStorage.setItem('demo-theme-a', html.classList.contains('dark') ? 'dark' : 'light');
      document.querySelector('.sun-icon').classList.toggle('hidden');
      document.querySelector('.moon-icon').classList.toggle('hidden');
    });
  </script>
</body>
</html>
