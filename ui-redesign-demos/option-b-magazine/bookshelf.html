<!DOCTYPE html>

<head>

  <script>
    tailwind.config = { darkMode:'class', theme:{ extend:{
      colors: { 'pink':{400:'#FF6BAB',500:'#FF4D8D'}, 'peach':{500:'#FF8A6D'}, 'night':{800:'#1A1A22',900:'#0F0F12'} }
    }}}

  <style>
    body { font-family:'Noto Sans SC', sans-serif; -webkit-tap-highlight-color: transparent; background:#FFFFFF; color:#0F0F12; }

</head>
<body class="min-h-screen pb-24">

  <header class="sticky top-0 z-40 backdrop-blur-xl bg-white/85 dark:bg-night-900/85">

        <button id="theme-toggle" class="w-9 h-9 flex items-center justify-center rounded-full">

          <svg class="w-5 h-5 moon-icon hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"/></svg>
        </button>
      </div>
    </div>

  <main class="container-app px-4 pt-3">

    <!-- 阅读卡 -->

        <div class="absolute -top-8 -right-8 w-32 h-32 rounded-full" style="background: radial-gradient(rgba(255,255,255,.3), transparent 70%);"></div>
        <div class="text-white relative">

          <div class="flex items-center gap-3 mt-4">

            <div class="flex-1">
              <div class="flex items-center gap-2 text-xs mb-2">
                <div class="flex-1 h-1.5 bg-white/30 rounded-full overflow-hidden"><div class="h-full bg-white rounded-full" style="width:42%"></div></div>
                <span class="font-bold">42%</span>
              </div>
              <a href="reading.html" class="inline-flex items-center gap-1 px-4 py-1.5 rounded-full bg-white text-pink-500 text-xs font-bold">继续阅读 →</a>

        </div>

      </div>
      <div class="p-3 bg-stone-50 dark:bg-night-800 rounded-2xl text-center">
        <div class="text-xl font-extrabold">12</div>
        <div class="text-[10px] text-stone-500 mt-0.5 font-bold">收藏</div>
      </div>
      <div class="p-3 bg-stone-50 dark:bg-night-800 rounded-2xl text-center">
        <div class="text-xl font-extrabold">8</div>

    <!-- Tab -->

        <button class="flex-1 py-2 rounded-full text-xs text-stone-600 dark:text-stone-400">在读</button>
        <button class="flex-1 py-2 rounded-full text-xs text-stone-600 dark:text-stone-400">想看</button>
        <button class="flex-1 py-2 rounded-full text-xs text-stone-600 dark:text-stone-400">完读</button>

    </section>

      <a href="detail.html">

          <div class="absolute top-1.5 right-1.5 w-2 h-2 rounded-full bg-yellow-400"></div>
          <div class="absolute inset-0 flex items-center justify-center font-serif font-bold text-white text-xs text-center p-2 leading-tight">长安月下<br/>归人未归</div>
        </div>
        <div class="text-xs font-bold truncate">长安月下，归人未归</div>
        <div class="text-[10px] text-stone-500 truncate">墨染流年</div>
      </a>
      <a href="detail.html">
        <div class="rounded-xl mb-2 relative overflow-hidden" style="aspect-ratio:3/4; background: linear-gradient(135deg,#5DC7AC,#7FD8BE);">
          <div class="absolute inset-0 flex items-center justify-center font-serif font-bold text-white text-xs text-center p-2 leading-tight">雨夜迷雾</div>
        </div>
        <div class="text-xs font-bold truncate">雨夜迷雾中的真相</div>
        <div class="text-[10px] text-stone-500 truncate">悬疑女王</div>

      <a href="detail.html">

      <a href="detail.html">

        </div>
        <div class="text-xs font-bold truncate">咖啡馆里的小确幸</div>
        <div class="text-[10px] text-stone-500 truncate">治愈系作者</div>
      </a>
      <a href="detail.html">
        <div class="rounded-xl mb-2 relative overflow-hidden" style="aspect-ratio:3/4; background: linear-gradient(135deg,#FFB6C1,#FFC5D0);">
          <div class="absolute inset-0 flex items-center justify-center font-serif font-bold text-stone-700 text-xs text-center p-2 leading-tight">桃花笺</div>
        </div>
        <div class="text-xs font-bold truncate">桃花笺</div>
        <div class="text-[10px] text-stone-500 truncate">墨染流年</div>
      </a>
      <a href="detail.html">
        <div class="rounded-xl mb-2 relative overflow-hidden" style="aspect-ratio:3/4; background: linear-gradient(135deg,#3D3935,#1A1B23);">
          <div class="absolute inset-0 flex items-center justify-center font-serif font-bold text-pink-300 text-xs text-center p-2 leading-tight">浮生若梦</div>
        </div>
        <div class="text-xs font-bold truncate">浮生若梦</div>
        <div class="text-[10px] text-stone-500 truncate">墨染流年</div>
      </a>
    </section>

    <button class="w-full py-3.5 mt-6 rounded-2xl border-2 border-dashed border-stone-200 dark:border-night-800 text-stone-400 text-sm flex items-center justify-center gap-2">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
      逛逛书城
    </button>

  </main>

  <nav class="fixed bottom-0 left-0 right-0 z-40 backdrop-blur-xl bg-white/95 dark:bg-night-900/95 border-t border-stone-100 dark:border-night-800" style="padding-bottom: env(safe-area-inset-bottom);">
    <div class="container-app grid grid-cols-4 h-16">
      <a href="index.html" class="flex flex-col items-center justify-center text-stone-400">
        <svg class="w-6 h-6 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/></svg>

      <a href="bookshelf.html" class="flex flex-col items-center justify-center text-pink-500">
        <svg class="w-6 h-6 mb-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M5.5 2A2.5 2.5 0 003 4.5v15A2.5 2.5 0 005.5 22h13a2.5 2.5 0 002.5-2.5v-15A2.5 2.5 0 0018.5 2h-13zM7 5h2v6l1-1 1 1V5h7v14H7V5z"/></svg>
        <span class="text-[10px] font-bold">书架</span>
      </a>
      <a href="reading.html" class="flex flex-col items-center justify-center -mt-6 relative">
        <div class="w-12 h-12 rounded-full bg-gradient-to-br from-pink-500 to-peach-500 flex items-center justify-center shadow-lg shadow-pink-500/40 ring-4 ring-white dark:ring-night-900">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 5.25h16.5m-16.5 4.5h16.5m-16.5 4.5h16.5m-16.5 4.5h16.5"/></svg>
        </div>
        <span class="text-[10px] font-bold mt-1 text-stone-400">阅读</span>
      </a>
      <a href="profile.html" class="flex flex-col items-center justify-center text-stone-400">

  <a href="../index.html" class="fixed top-3 left-3 z-50 w-9 h-9 flex items-center justify-center rounded-full bg-white/80 dark:bg-night-800/80 backdrop-blur shadow-lg text-stone-600 dark:text-stone-300 opacity-0 pointer-events-none">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
  </a>

  <script>
    const html = document.documentElement;
    if (localStorage.getItem('demo-theme-b') === 'dark') html.classList.add('dark');
    document.querySelector('.sun-icon').classList.toggle('hidden', html.classList.contains('dark'));
    document.querySelector('.moon-icon').classList.toggle('hidden', !html.classList.contains('dark'));
    document.getElementById('theme-toggle').addEventListener('click', () => {
      html.classList.toggle('dark');
      localStorage.setItem('demo-theme-b', html.classList.contains('dark') ? 'dark' : 'light');
      document.querySelector('.sun-icon').classList.toggle('hidden');
      document.querySelector('.moon-icon').classList.toggle('hidden');
    });
  </script>
</body>
</html>
