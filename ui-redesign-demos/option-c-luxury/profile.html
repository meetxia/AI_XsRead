<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = { darkMode:'class', theme:{ extend:{
      colors: { 'gold':{300:'#E0C58A',400:'#D4B679',500:'#C9A961',600:'#A88B47'}, 'cream':{50:'#F5F1EA',100:'#EDE6D8'}, 'coffee':{700:'#3A2E20',800:'#2A1F15',900:'#15110D'} }
    }}}
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background:#F5F1EA; color:#2A1F15; }
    html.dark body { background:#15110D; color:#E8DFC9; }
    .serif-en { font-family: 'Playfair Display', serif; }
    .serif-cn { font-family: 'Noto Serif SC', serif; }
    .container-app { max-width:480px; margin:0 auto; }
    @media(min-width:768px){ .container-app{max-width:720px;} }
    .glass { background: rgba(245,241,234,0.6); backdrop-filter: blur(20px); }
    html.dark .glass { background: rgba(21,17,13,0.6); }
    .gold-text { color:#C9A961; }
    .gold-line { background: linear-gradient(to right, transparent, #C9A961 50%, transparent); height:1px; }
    .fade-up { animation: fadeUp .9s cubic-bezier(.4,0,.2,1) both; }
    @keyframes fadeUp { from{opacity:0; transform: translateY(20px);} to{opacity:1; transform: translateY(0);} }

</head>
<body class="min-h-screen pb-24">

  <header class="sticky top-0 z-40 glass border-b border-gold-500/15">
    <div class="container-app px-5 h-14 flex items-center justify-between">

      </div>
      <button id="theme-toggle" class="w-9 h-9 flex items-center justify-center rounded-full">

        <svg class="w-4 h-4 gold-text moon-icon hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"/></svg>

  <main class="container-app px-5 pt-6">

    <!-- 用户卡 -->
    <section class="fade-up text-center">
      <div class="relative inline-block mb-3">
        <div class="absolute inset-0 -m-2 rounded-full border border-gold-500/20"></div>
        <div class="w-20 h-20 rounded-full bg-gradient-to-br from-coffee-800 to-coffee-900 dark:from-cream-100 dark:to-cream-200 flex items-center justify-center serif-cn gold-text text-2xl font-bold relative">小</div>
      </div>
      <div class="flex items-center justify-center gap-2">
        <h2 class="serif-cn text-xl font-bold">小满</h2>

    <!-- 阅读统计卡 -->

      </div>

      <div class="grid grid-cols-3 gap-3">

        </div>

        <div class="flex-shrink-0 text-center">
          <div class="w-14 h-14 rounded-full bg-gradient-to-br from-gold-400 to-gold-600 flex items-center justify-center text-2xl shadow-lg shadow-gold-500/30 ring-1 ring-gold-500/40">🌟</div>
          <div class="text-[10px] mt-1 gold-text serif-cn">早起</div>
        </div>
        <div class="flex-shrink-0 text-center opacity-30">
          <div class="w-14 h-14 rounded-full bg-coffee-800 dark:bg-cream-200/20 flex items-center justify-center text-2xl border border-gold-500/20">🔒</div>
          <div class="text-[10px] mt-1 text-stone-500">未解锁</div>
        </div>
        <div class="flex-shrink-0 text-center opacity-30">
          <div class="w-14 h-14 rounded-full bg-coffee-800 dark:bg-cream-200/20 flex items-center justify-center text-2xl border border-gold-500/20">🔒</div>

    <!-- 设置列表 -->

        <div class="flex-1">

          <div class="text-[10px] gold-text/70 tracking-widest mt-0.5">SECURITY</div>
        </div>
        <svg class="w-3 h-3 gold-text/40" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
      </a>
      <a href="#" class="flex items-center gap-4 px-5 py-4 hover:bg-gold-500/5">
        <div class="w-9 h-9 rounded-xl border border-gold-500/40 flex items-center justify-center gold-text"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.76c0 1.6 1.123 2.994 2.707 3.227 1.068.157 2.148.279 3.238.364.466.037.893.281 1.153.671L12 21l2.652-3.978c.26-.39.687-.634 1.153-.67 1.09-.086 2.17-.208 3.238-.365 1.584-.233 2.707-1.626 2.707-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.394 48.394 0 0012 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v6.018z"/></svg></div>
        <div class="flex-1">
          <div class="serif-cn text-sm font-semibold">意见反馈</div>
          <div class="text-[10px] gold-text/70 tracking-widest mt-0.5">FEEDBACK</div>
        </div>
        <svg class="w-3 h-3 gold-text/40" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
      </a>
    </section>

    <!-- 主题 -->
    <section class="mt-6 p-5 rounded-2xl glass border border-gold-500/15 fade-up" style="animation-delay:.25s">
      <div class="text-center mb-3">
        <div class="serif-en text-[10px] gold-text tracking-[0.3em] italic">APPEARANCE</div>
        <div class="gold-line w-12 mx-auto mt-2"></div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <button class="aspect-[3/2] rounded-xl border-2 border-gold-500/30 dark:border-gold-500/20 bg-cream-50 relative overflow-hidden">
          <div class="absolute inset-2 bg-white rounded-md flex items-center justify-center">
            <span class="serif-cn text-xs text-coffee-900">浅色</span>

        </button>
        <button class="aspect-[3/2] rounded-xl border-2 border-gold-500 bg-coffee-900 relative overflow-hidden">
          <div class="absolute inset-2 bg-coffee-800 rounded-md flex items-center justify-center">
            <span class="serif-cn text-xs gold-text">深色</span>
          </div>
          <div class="absolute top-1 right-1 w-4 h-4 rounded-full bg-gold-500 flex items-center justify-center">
            <svg class="w-2.5 h-2.5 text-coffee-900" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>

    <button class="w-full mt-6 py-3.5 rounded-2xl border border-gold-500/30 gold-text text-xs tracking-[0.2em]">SIGN OUT</button>

    <div class="text-center mt-8">
      <div class="gold-line w-32 mx-auto mb-3"></div>
      <div class="serif-en text-[10px] gold-text italic tracking-[0.4em]">— EST. 2026 —</div>
    </div>

  </main>

  <nav class="fixed bottom-0 left-0 right-0 z-40 glass border-t border-gold-500/20" style="padding-bottom: env(safe-area-inset-bottom);">

      <a href="reading.html" class="flex flex-col items-center justify-center text-stone-500"><svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 5.25h16.5m-16.5 4.5h16.5m-16.5 4.5h16.5m-16.5 4.5h16.5"/></svg><span class="text-[10px] tracking-[0.2em] serif-en italic">READ</span></a>
      <a href="profile.html" class="flex flex-col items-center justify-center gold-text"><svg class="w-5 h-5 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12a5 5 0 100-10 5 5 0 000 10zM4 22a8 8 0 1116 0H4z"/></svg><span class="text-[10px] tracking-[0.2em] serif-en italic">ME</span></a>

  <a href="../index.html" class="fixed top-3 left-3 z-50 w-9 h-9 flex items-center justify-center rounded-full glass border border-gold-500/30 gold-text opacity-0 pointer-events-none">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
  </a>

  <script>
    const html = document.documentElement;
    const stored = localStorage.getItem('demo-theme-c');
    if (stored === 'light') html.classList.remove('dark');
    else html.classList.add('dark');
    document.querySelector('.sun-icon').classList.toggle('hidden', html.classList.contains('dark'));
    document.querySelector('.moon-icon').classList.toggle('hidden', !html.classList.contains('dark'));
    document.getElementById('theme-toggle').addEventListener('click', () => {
      html.classList.toggle('dark');
      localStorage.setItem('demo-theme-c', html.classList.contains('dark') ? 'dark' : 'light');
      document.querySelector('.sun-icon').classList.toggle('hidden');
      document.querySelector('.moon-icon').classList.toggle('hidden');
    });
  </script>
</body>
</html>
