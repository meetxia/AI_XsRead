<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FAF6F1" />
    <title>文字之境</title>
    <!-- 资源路径运行时（配合 vite.config.js 中的 experimental.renderBuiltUrl）。
         build 出的代码会通过 window.__assetsPath('js/foo.js') 解析每一个 chunk URL，
         这里给一个最小可用的同源实现：直接返回根路径下的相对地址。
         注意：必须在主入口 script 之前定义，否则首屏会卡在动态 import 阶段、页面空白。 -->
    <script>
      window.__assetsPath = function (p) {
        return '/' + String(p).replace(/^\/+/, '');
      };
    </script>
    <!-- 主题预加载（避免 FOUC） -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('xs-theme');
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var mode = stored || (prefersDark ? 'dark' : 'light');
          if (mode === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
