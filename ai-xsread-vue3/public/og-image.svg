<?xml version="1.0" encoding="UTF-8"?>
<!--
  MOMO小说 Open Graph 社交分享卡
  规格: 1200x630, 用于 og:image / twitter:image
  注意: 部分社交平台 (微信/微博) 仅支持 PNG/JPG。生产部署前建议执行:
    npx svgexport public/og-image.svg public/og-image.png 1200:630
  并把 index.html 中的 og:image 同步替换为 .png 版本。
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDFAF6"/>
      <stop offset="100%" stop-color="#F2EAE0"/>
    </linearGradient>
    <linearGradient id="markBg" x1="96" y1="220" x2="276" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5A0B3B"/>
      <stop offset="58%" stop-color="#4A082F"/>
      <stop offset="100%" stop-color="#3B0627"/>
    </linearGradient>
    <linearGradient id="markM" x1="130" y1="260" x2="240" y2="370" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF94A8"/>
      <stop offset="55%" stop-color="#FF7893"/>
      <stop offset="100%" stop-color="#FF9AAE"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.15" r="0.7">
      <stop offset="0%" stop-color="#C7A07E" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#C7A07E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- 底部装饰横线 -->
  <line x1="80" y1="555" x2="1120" y2="555" stroke="#A87A56" stroke-opacity="0.25" stroke-width="1"/>

  <!-- 左侧 Logo 图标 -->
  <g transform="translate(96, 220)">
    <rect x="0" y="0" width="180" height="180" rx="38" fill="url(#markBg)"/>
    <path
      d="M48 116V63C48 54 61 52 67 60L90 96L113 60C119 52 132 54 132 63V116"
      fill="none"
      stroke="url(#markM)"
      stroke-width="25"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>

  <!-- 右侧文案 -->
  <g transform="translate(340, 230)" font-family="'Noto Serif SC', 'Source Han Serif SC', 'Songti SC', serif">
    <!-- 主标题 -->
    <text x="0" y="60" font-size="120" font-weight="700" fill="#2A2520">MOMO小说</text>
    <!-- Slogan -->
    <text x="0" y="140" font-size="40" font-weight="500" fill="#5A4F47" letter-spacing="6">故事入境 · 杂念自消</text>
    <!-- 描述 -->
    <text x="0" y="210" font-size="26" fill="#8C7F76">都市言情 · 古风穿越 · 悬疑推理 · 治愈系 · 奇幻冒险</text>
    <text x="0" y="252" font-size="26" fill="#8C7F76">为热爱阅读的你，精选每一本好故事</text>
  </g>

  <!-- 右上角站名小标 -->
  <g transform="translate(1080, 80)" text-anchor="end" font-family="'Inter', system-ui, sans-serif">
    <text x="0" y="0" font-size="22" font-weight="500" fill="#A87A56" letter-spacing="4">MOMO NOVEL</text>
  </g>
</svg>
